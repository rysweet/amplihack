[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Pure unit tests (no filesystem, no network)
    integration: Integration tests (uses fixtures/filesystem)
    e2e: End-to-end tests (full workflow)
    security: Security invariant tests
    scenario_a: Evaluation Scenario A tests
    scenario_b: Evaluation Scenario B tests
    scenario_c: Evaluation Scenario C tests
