name: "code-atlas"
description: |
  Builds a comprehensive, living code atlas as multi-layer architecture documents.
  Enforces the full 3-pass bug-hunt workflow. Produces 8 layers (Layers 1–8) plus
  per-journey PASS/FAIL/NEEDS_ATTENTION verdicts from Pass 3.
  Never silently substitutes diagrams with tables (density guard, FORBIDDEN_PATTERNS §2).
version: "1.1.0"
author: "Amplihack Team"
tags: ["architecture", "documentation", "bug-hunting", "atlas", "code-atlas"]

# CODE-ATLAS RECIPE
#
# 10 sequential steps covering prerequisites → 8 layers → 3-pass bug hunt → publish → report.
#
# Layers:
#   1. Runtime Topology          — services, containers, ports, connections
#   2. Compile-time Dependencies — packages, modules, circular dependency detection
#   3. HTTP Routing              — routes, DTOs, middleware chains
#   4. Data Flow                 — DTO-to-storage chain, transformation steps
#   5. User Journey Scenarios    — entry-point to outcome sequence diagrams
#   6. Exhaustive Inventory      — services, env vars, data stores, external deps
#   7. Service Component Architecture — per-service module/package diagrams (NEW)
#   8. AST+LSP Symbol Bindings   — dead code, cross-file refs, interface mismatches (NEW)
#
# Bug Hunt (3-pass):
#   Pass 1: Comprehensive build + contradiction hunt (all 8 layers)
#   Pass 2: Fresh-eyes cross-check (new context window; no anchoring bias)
#   Pass 3: Scenario deep-dive; per-journey PASS/FAIL/NEEDS_ATTENTION verdict
#
# Density Guard (applied at every layer):
#   >50 nodes OR >100 edges → user prompt (a/b/c); NEVER silent table substitution
#
# Security Compliance:
#   SEC-01 through SEC-19 from SECURITY.md apply to all steps.
#   SEC-17: codebase_path and output_dir are validated before use (no shell metacharacters).
#
# Usage:
#   amplifier recipes execute code-atlas.yaml --context '{
#     "codebase_path": ".",
#     "output_dir": "docs/atlas"
#   }'
#
# Run specific layers only:
#   amplifier recipes execute code-atlas.yaml --context '{
#     "codebase_path": "services/billing",
#     "layers": [3, 4, 7, 8],
#     "bug_hunt": false
#   }'

recursion:
  max_depth: 3
  max_total_steps: 30

# ---------------------------------------------------------------------------
# Parameters — passed as structured data only (SEC-17: no shell interpolation)
# ---------------------------------------------------------------------------
parameters:
  codebase_path:
    type: string
    required: true
    default: "."
    description: "Root directory to analyse. Must be a readable path with no null bytes or shell metacharacters (SEC-17)."

  output_dir:
    type: string
    required: false
    default: "docs/atlas"
    description: "Where to write atlas output. Must stay within the repository (SEC-05)."

  layers:
    type: array
    items:
      type: integer
      enum: [1, 2, 3, 4, 5, 6, 7, 8]
    required: false
    default: [1, 2, 3, 4, 5, 6, 7, 8]
    description: "Which layers to build. Defaults to all 8."

  diagram_formats:
    type: array
    items:
      type: string
      enum: ["mermaid", "dot", "both"]
    required: false
    default: ["mermaid", "dot"]
    description: "Output diagram formats."

  bug_hunt:
    type: boolean
    required: false
    default: true
    description: "Run all three bug-hunt passes after building layers."

  density_threshold_nodes:
    type: integer
    required: false
    default: 50
    minimum: 1
    maximum: 10000
    description: "Node count threshold for density guard prompt (SEC-13)."

  density_threshold_edges:
    type: integer
    required: false
    default: 100
    minimum: 1
    maximum: 10000
    description: "Edge count threshold for density guard prompt (SEC-13)."

  publish:
    type: boolean
    required: false
    default: false
    description: "Trigger GitHub Pages publication after atlas build."

# ---------------------------------------------------------------------------
# Steps — exactly 10 named sequential steps
# ---------------------------------------------------------------------------
steps:

  # ==========================================================================
  # STEP 1: VALIDATE PREREQUISITES
  # Check tool availability, parameter validity, LSP status, and graph engine.
  # SEC-17: Validate codebase_path and output_dir before any file operations.
  # ==========================================================================
  - id: "validate-prerequisites"
    name: "Step 1: Validate Prerequisites"
    type: "skill"
    skill: "code-atlas"
    task: "validate-prerequisites"
    description: |
      Validate all prerequisites before any atlas work begins:
      1. Verify codebase_path exists and is readable
      2. Validate codebase_path has no null bytes or shell metacharacters (SEC-17)
      3. Verify output_dir is writable and within the repository (SEC-05)
      4. Validate density_threshold_nodes and density_threshold_edges (SEC-13: 1–10,000)
      5. Check for optional tools: graphviz (dot), mermaid-cli (mmdc) — log availability
      6. Query lsp-setup skill for LSP availability — record mode (lsp-assisted or static-approximation)
      7. Report prerequisite summary to user before proceeding
    inputs:
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
      density_threshold_nodes: "{{parameters.density_threshold_nodes}}"
      density_threshold_edges: "{{parameters.density_threshold_edges}}"
    outputs:
      - lsp_mode           # "lsp-assisted" or "static-approximation"
      - tools_available    # Array: ["graphviz", "mmdc"] or subset
      - validation_passed  # boolean

  # ==========================================================================
  # STEP 2: BUILD LAYERS 1–4 (INFRASTRUCTURE LAYERS)
  # Runtime topology, compile-time deps, HTTP routing, data flow.
  # These layers form the structural foundation that Layers 5–8 depend on.
  # ==========================================================================
  - id: "build-layers-1-to-4"
    name: "Step 2: Build Layers 1–4 (Infrastructure)"
    type: "skill"
    skill: "code-atlas"
    task: "build-layers"
    description: |
      Build the four infrastructure layers:
      Layer 1 — Runtime Topology: discover services from docker-compose/k8s manifests;
        map ports and inter-service connections; density guard applies.
      Layer 2 — Compile-time Dependencies: parse go.mod/package.json/Cargo.toml/etc.;
        detect circular dependencies; delegate Python to code-visualizer skill.
      Layer 3 — HTTP Routing: extract all routes per framework (chi/gin/Express/FastAPI/NestJS/axum/etc.);
        build route inventory table; density guard applies.
      Layer 4 — Data Flow: map DTO-to-storage chain; cross-reference with Layer 3 handlers.
      Apply density guard at each diagram: >50 nodes OR >100 edges → prompt user (SEC-13/14).
      Apply SEC-01–SEC-10 throughout.
    inputs:
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
      layers: [1, 2, 3, 4]
      diagram_formats: "{{parameters.diagram_formats}}"
      density_threshold_nodes: "{{parameters.density_threshold_nodes}}"
      density_threshold_edges: "{{parameters.density_threshold_edges}}"
    depends_on:
      - "validate-prerequisites"
    condition: "{{steps.validate-prerequisites.outputs.validation_passed}}"

  # ==========================================================================
  # STEP 3: BUILD LAYERS 5–6 (USER-FACING LAYERS)
  # User journey scenarios and exhaustive inventory.
  # ==========================================================================
  - id: "build-layers-5-to-6"
    name: "Step 3: Build Layers 5–6 (User-Facing)"
    type: "skill"
    skill: "code-atlas"
    task: "build-layers"
    description: |
      Build the two user-facing layers:
      Layer 5 — User Journey Scenarios: auto-derive journeys from Layer 3 routes (minimum 3);
        user-defined journeys in docs/atlas/journeys.yaml take precedence;
        produce one sequence diagram per journey.
      Layer 6 — Exhaustive Inventory: build four inventory tables (services, env vars,
        data stores, external deps); SEC-01 applies (env var values never written).
      Apply density guard to Layer 5 diagrams when node/edge count exceeds thresholds.
    inputs:
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
      layers: [5, 6]
      diagram_formats: "{{parameters.diagram_formats}}"
      density_threshold_nodes: "{{parameters.density_threshold_nodes}}"
      density_threshold_edges: "{{parameters.density_threshold_edges}}"
    depends_on:
      - "build-layers-1-to-4"

  # ==========================================================================
  # STEP 4: BUILD LAYER 7 (SERVICE COMPONENT ARCHITECTURE)
  # Per-service module/package/component diagrams.
  # SEC-11: service names sanitised to [a-zA-Z0-9_-]{1,64} before path use.
  # ==========================================================================
  - id: "build-layer-7"
    name: "Step 4: Build Layer 7 (Service Component Architecture)"
    type: "skill"
    skill: "code-atlas"
    task: "build-layer-7"
    description: |
      Build Layer 7 — Service Component Architecture:
      For each service discovered in Layer 1:
        1. Discover internal packages/modules using language-specific patterns
           (Python: __init__.py; Go: directory-per-package; TS: workspaces; .NET: .csproj; Rust: mod declarations)
        2. Sanitise service name to [a-zA-Z0-9_-]{1,64} before path construction (SEC-11)
        3. Identify key exported symbols (public classes, interfaces, functions)
        4. Build Mermaid graph TD: packages → files → key exported symbols
        5. Apply density guard: >50 components or >100 edges → prompt user (SEC-13/14)
        6. Write {service-name}.mmd and (if mmdc available) {service-name}.svg
      Delegate Python package discovery to code-visualizer skill.
      Emit LAYER7_SOURCE_NOT_FOUND (non-fatal) for services with no discoverable structure.
    inputs:
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
      density_threshold_nodes: "{{parameters.density_threshold_nodes}}"
      density_threshold_edges: "{{parameters.density_threshold_edges}}"
      services: "{{steps.build-layers-1-to-4.outputs.services_discovered}}"
    depends_on:
      - "build-layers-1-to-4"

  # ==========================================================================
  # STEP 5: BUILD LAYER 8 (AST+LSP SYMBOL BINDINGS)
  # Cross-file references, dead code, interface mismatches.
  # SEC-12: all LSP output sanitised before embedding.
  # SEC-15: LAYER8_CREDENTIAL_PATTERNS applied to all four output files.
  # ==========================================================================
  - id: "build-layer-8"
    name: "Step 5: Build Layer 8 (AST+LSP Symbol Bindings)"
    type: "skill"
    skill: "code-atlas"
    task: "build-layer-8"
    description: |
      Build Layer 8 — AST+LSP Symbol Bindings:
      Operating mode is set by lsp-setup delegation result (from Step 1).
      Mode MUST be written verbatim on line 1 of layer8-ast-lsp-bindings/README.md.
      Never hidden. Never defaulted silently.

      Three queries, each producing a separate output file:
      1. symbol-references: cross-file reference graph (symbol-references.mmd)
      2. dead-code: exported symbols with zero references (dead-code.md)
      3. interface-mismatches: call-site vs definition signature mismatches (mismatched-interfaces.md)

      LSP-assisted path: delegate each query to lsp-setup skill (§2f contract).
      Static-approximation path: use ripgrep + code-visualizer AST for best-effort analysis.

      Security:
      - SEC-12: validate LSP output schema; apply SEC-03 + SEC-02 + SEC-09 to all fields
      - SEC-15: LAYER8_CREDENTIAL_PATTERNS applied before writing each output file
      - Density guard on symbol-references.mmd (SEC-13/14)

      Emit LAYER8_LSP_UNAVAILABLE (non-fatal, informational) when using static mode.
    inputs:
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
      lsp_mode: "{{steps.validate-prerequisites.outputs.lsp_mode}}"
      density_threshold_nodes: "{{parameters.density_threshold_nodes}}"
      density_threshold_edges: "{{parameters.density_threshold_edges}}"
    depends_on:
      - "validate-prerequisites"
      - "build-layers-1-to-4"

  # ==========================================================================
  # STEP 6: BUG-HUNT PASS 1 — COMPREHENSIVE BUILD + HUNT
  # Structural contradictions across all 8 layers.
  # SEC-09: credential redaction in all evidence fields.
  # SEC-16: all evidence paths must be relative.
  # ==========================================================================
  - id: "bug-hunt-pass-1"
    name: "Step 6: Bug-Hunt Pass 1 (Comprehensive Build + Hunt)"
    type: "agent"
    agent: "amplihack:amplihack:core:reviewer"
    description: |
      Pass 1 — Comprehensive Build + Hunt across all 8 layers:

      Step 1.1 — Route ↔ DTO Mismatch Detection (Layer 3 × Layer 4):
        Compare handler field accesses against DTO declarations.
      Step 1.2 — Orphaned Environment Variables (Layer 1 × Layer 6b):
        Find env vars used in code but absent from .env.example (orphaned).
        Find env vars declared in .env.example but never used (undead).
      Step 1.3 — Dead Runtime Paths (Layer 1 × Layer 3):
        Services in topology with no routes; routes with no service in topology.
      Step 1.4 — Stale Documentation Contradictions:
        Docs referencing routes that no longer exist in code.
      Step 1.5 — Layer 7 internal coupling issues:
        Services with no discoverable packages; high-coupling packages (≥3 importers).
      Step 1.6 — Layer 8 symbol issues:
        Dead exported symbols; interface mismatches.

      For each contradiction found: produce a BugReport with pass=1, evidence (relative paths only, SEC-16),
      and credential-redacted code quotes (SEC-09).
      Write findings to: docs/atlas/bug-reports/{YYYY-MM-DD}-pass1-{slug}.md
    inputs:
      atlas_path: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      layers_available: [1, 2, 3, 4, 5, 6, 7, 8]
    condition: "{{parameters.bug_hunt}}"
    depends_on:
      - "build-layers-1-to-4"
      - "build-layers-5-to-6"
      - "build-layer-7"
      - "build-layer-8"

  # ==========================================================================
  # STEP 7: BUG-HUNT PASS 2 — FRESH-EYES CROSS-CHECK
  # New context window. No Pass 1 conclusions visible initially.
  # Prevents anchoring bias.
  # ==========================================================================
  - id: "bug-hunt-pass-2"
    name: "Step 7: Bug-Hunt Pass 2 (Fresh-Eyes Cross-Check)"
    type: "agent"
    agent: "amplihack:amplihack:core:reviewer"
    description: |
      Pass 2 — Fresh-Eyes Cross-Check (run in a new context window):

      Phase A — Independent re-examination:
        Read all layer output files from scratch, without knowledge of Pass 1 conclusions.
        Identify contradictions independently (same checklist as Pass 1, fresh perspective).

      Phase B — Cross-check Pass 1 findings:
        For each Pass 1 bug report, assign one of:
        - CONFIRMED: independent analysis agrees → severity upgraded
        - OVERTURNED: analysis disagrees → finding closed with explanation
        - NEEDS_ATTENTION: ambiguous → human review required

      Write findings to: docs/atlas/bug-reports/{YYYY-MM-DD}-pass2-{slug}.md
      Include pass=2 in all BugReport objects.
      Apply SEC-09 (credential redaction) and SEC-16 (relative paths) throughout.
    inputs:
      atlas_path: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      pass1_reports: "{{steps.bug-hunt-pass-1.outputs.bug_report_paths}}"
    condition: "{{parameters.bug_hunt}}"
    depends_on:
      - "bug-hunt-pass-1"
    # IMPORTANT: This agent receives pass1_reports ONLY in Phase B.
    # Phase A must complete before pass1_reports are shared with the agent.
    execution_mode: "two-phase"

  # ==========================================================================
  # STEP 8: BUG-HUNT PASS 3 — SCENARIO DEEP-DIVE
  # Per-journey trace. Produces JourneyVerdict for each Layer 5 journey.
  # SEC-16: all evidence paths must be relative.
  # ==========================================================================
  - id: "bug-hunt-pass-3"
    name: "Step 8: Bug-Hunt Pass 3 (Scenario Deep-Dive)"
    type: "agent"
    agent: "amplihack:amplihack:core:reviewer"
    description: |
      Pass 3 — Scenario Deep-Dive; per-journey PASS/FAIL/NEEDS_ATTENTION verdicts:

      For each journey in docs/atlas/layer5-journeys/*.mmd:
        Trace every step through Layers 3, 4, 1, 7, and 8.
        Evaluate four mandatory criteria per journey:
          1. Layer 3 routes match journey steps
          2. Layer 4 data flows complete
          3. Layer 7 service components reachable
          4. No dead code on critical path (Layer 8)
        Produce a JourneyVerdict with:
          - verdict: PASS | FAIL | NEEDS_ATTENTION
          - criteria table with ✅/❌/⚠️ and evidence (file:line, relative, SEC-16)
          - rationale: one paragraph explaining the verdict

      Write one file per journey: docs/atlas/bug-reports/{YYYY-MM-DD}-pass3-{journey-slug}.md
      Include pass=3 and layers_involved in all BugReport objects.
      Apply SEC-09 (credential redaction) and SEC-16 (relative paths) throughout.
    inputs:
      atlas_path: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      journeys: "{{steps.build-layers-5-to-6.outputs.journeys}}"
    condition: "{{parameters.bug_hunt}}"
    depends_on:
      - "bug-hunt-pass-2"
      - "build-layer-7"
      - "build-layer-8"

  # ==========================================================================
  # STEP 9: PUBLISH ATLAS
  # Write docs/atlas/ index, staleness-map.yaml, and optionally push to GitHub Pages.
  # SEC-19: git push output sanitised for credentials before display.
  # ==========================================================================
  - id: "publish-atlas"
    name: "Step 9: Publish Atlas"
    type: "skill"
    skill: "code-atlas"
    task: "publish"
    description: |
      Publish the completed atlas:
      1. Write docs/atlas/README.md index (links to all 8 layers + bug reports + experiments/)
      2. Write docs/atlas/staleness-map.yaml (Glob → layer mappings for CI; includes Layers 7+8)
      3. Render SVG files for all .mmd diagrams (if mmdc available)
      4. If publish=true: push docs/atlas/ to GitHub Pages branch
         SEC-19: sanitise git push stdout/stderr with CREDENTIAL_URL_PATTERN before display
      5. Update mkdocs.yml nav (if mkdocs.yml exists) to include Layers 7+8 entries
    inputs:
      output_dir: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      publish: "{{parameters.publish}}"
      tools_available: "{{steps.validate-prerequisites.outputs.tools_available}}"
    depends_on:
      - "bug-hunt-pass-3"

  # ==========================================================================
  # STEP 10: SUMMARISE AND REPORT
  # Final summary to user with metrics, verdict counts, and next steps.
  # ==========================================================================
  - id: "summarise-and-report"
    name: "Step 10: Summarise and Report"
    type: "skill"
    skill: "code-atlas"
    task: "summarise"
    description: |
      Produce the final completion summary:
      1. Layers built: count and list (e.g. "8 of 8 layers built")
      2. Diagrams created: count of .mmd and .svg files
      3. Layer 7 summary: N services mapped, average components per service
      4. Layer 8 mode: lsp-assisted or static-approximation; N dead symbols found
      5. Bug hunt summary:
         - Pass 1: N findings (breakdown by severity)
         - Pass 2: N confirmed, N overturned, N needs-attention
         - Pass 3: N journeys traced; PASS/FAIL/NEEDS_ATTENTION breakdown
      6. Density guard activations: N diagrams prompted user
      7. Errors: list any SkillError codes emitted (LAYER7_SOURCE_NOT_FOUND, LAYER8_LSP_UNAVAILABLE, etc.)
      8. Next steps: specific rebuild commands for stale layers; lsp-setup suggestion if static mode used
      Report to user as structured completion message.
    inputs:
      output_dir: "{{parameters.output_dir}}"
      all_step_outputs: "{{steps}}"
    depends_on:
      - "publish-atlas"
