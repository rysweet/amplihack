name: "code-atlas"
description: |
  Builds a comprehensive, living code atlas as multi-layer architecture documents.
  Enforces the full 3-pass bug-hunt workflow. Produces 8 layers (Layers 1–8) plus
  per-journey PASS/FAIL/NEEDS_ATTENTION verdicts from Pass 3.
  Never silently substitutes diagrams with tables (density guard, FORBIDDEN_PATTERNS §2).
version: "1.1.0"
author: "Amplihack Team"
tags: ["architecture", "documentation", "bug-hunting", "atlas", "code-atlas"]

# CODE-ATLAS RECIPE
#
# 14 step IDs in 10 logical phases:
#   Phase 1: Validate prerequisites (1 step)
#   Phase 2: Build all 8 layers (1 step)
#   Phase 3-4: Dual-format bug hunt (2 parallel steps)
#   Phase 5: Merge findings (1 step)
#   Phase 6: Multi-agent validation — 3 parallel specialists + tally (4 steps)
#   Phase 7: File validated issues — ensure label + file (2 steps)
#   Phase 8: Ingest to Kuzu graph (1 step)
#   Phase 9: Publish atlas (1 step)
#   Phase 10: Summarise and report (1 step)
# The experiment (Appendix A) proved Mermaid and Graphviz find ~85% different bugs.
# Running both in parallel finds ~1.7x the bugs of either alone.
#
# Layers:
#   1. Repository Surface         — source files, project structure, build systems
#   2. Runtime Topology          — services, containers, ports, connections
#   3. Compile-time Dependencies — packages, modules, circular dependency detection
#   4. API Contracts             — HTTP routes, gRPC, GraphQL, OpenAPI, DTOs
#   5. Data Flow                 — DTO-to-storage chain, transformation steps
#   6. User Journey Scenarios    — entry-point to outcome sequence diagrams
#   7. Service Component Architecture — per-service module/package diagrams (NEW)
#   8. AST+LSP Symbol Bindings   — dead code, cross-file refs, interface mismatches (NEW)
#
# Bug Hunt (3-pass):
#   Pass 1: Comprehensive build + contradiction hunt (all 8 layers)
#   Pass 2: Fresh-eyes cross-check (new context window; no anchoring bias)
#   Pass 3: Scenario deep-dive; per-journey PASS/FAIL/NEEDS_ATTENTION verdict
#
# Density Guard (applied at every layer):
#   >50 nodes OR >100 edges → user prompt (a/b/c); NEVER silent table substitution
#
# Security Compliance:
#   SEC-01 through SEC-19 from SECURITY.md apply to all steps.
#   SEC-17: codebase_path and output_dir are validated before use (no shell metacharacters).
#
# Usage:
#   amplifier recipes execute code-atlas.yaml --context '{
#     "codebase_path": ".",
#     "output_dir": "docs/atlas"
#   }'
#
# Run specific layers only:
#   amplifier recipes execute code-atlas.yaml --context '{
#     "codebase_path": "services/billing",
#     "layers": [3, 4, 7, 8],
#     "bug_hunt": false
#   }'

recursion:
  max_depth: 3
  max_total_steps: 30

# ---------------------------------------------------------------------------
# Parameters — passed as structured data only (SEC-17: no shell interpolation)
# ---------------------------------------------------------------------------
parameters:
  codebase_path:
    type: string
    required: true
    default: "."
    description: "Root directory to analyse. Must be a readable path with no null bytes or shell metacharacters (SEC-17)."

  output_dir:
    type: string
    required: false
    default: "docs/atlas"
    description: "Where to write atlas output. Must stay within the repository (SEC-05)."

  layers:
    type: array
    items:
      type: integer
      enum: [1, 2, 3, 4, 5, 6, 7, 8]
    required: false
    default: [1, 2, 3, 4, 5, 6, 7, 8]
    description: "Which layers to build. Defaults to all 8."

  diagram_formats:
    type: array
    items:
      type: string
      enum: ["mermaid", "dot", "both"]
    required: false
    default: ["mermaid", "dot"]
    description: "Output diagram formats."

  bug_hunt:
    type: boolean
    required: false
    default: true
    description: "Run all three bug-hunt passes after building layers."

  density_threshold_nodes:
    type: integer
    required: false
    default: 50
    minimum: 1
    maximum: 10000
    description: "Node count threshold for density guard prompt (SEC-13)."

  density_threshold_edges:
    type: integer
    required: false
    default: 100
    minimum: 1
    maximum: 10000
    description: "Edge count threshold for density guard prompt (SEC-13)."

  publish:
    type: boolean
    required: false
    default: false
    description: "Trigger GitHub Pages publication after atlas build."

# ---------------------------------------------------------------------------
# Steps — 12 named steps
# ---------------------------------------------------------------------------
steps:

  # ==========================================================================
  # STEP 1: VALIDATE PREREQUISITES
  # ==========================================================================
  - id: "validate-prerequisites"
    name: "Step 1: Validate Prerequisites"
    type: "skill"
    skill: "code-atlas"
    task: "validate-prerequisites"
    description: |
      Validate all prerequisites before any atlas work begins:
      1. Verify codebase_path exists, is readable, has no null bytes or shell metacharacters (SEC-17)
      2. Verify output_dir is writable and within the repository (SEC-05)
      3. Validate density thresholds (SEC-13: 1–10,000)
      4. Check tools: graphviz (dot), mermaid-cli (mmdc) — log availability
      5. Query lsp-setup skill for LSP availability — record mode
      6. Report prerequisite summary to user
    inputs:
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
      density_threshold_nodes: "{{parameters.density_threshold_nodes}}"
      density_threshold_edges: "{{parameters.density_threshold_edges}}"
    outputs:
      - lsp_mode           # "lsp-assisted" or "static-approximation"
      - tools_available    # Array: ["graphviz", "mmdc"] or subset
      - validation_passed  # boolean

  # ==========================================================================
  # STEP 2: BUILD ALL 8 LAYERS
  # All layers built together in both formats. No artificial grouping.
  # ==========================================================================
  - id: "build-all-layers"
    name: "Step 2: Build All 8 Layers"
    type: "agent"
    agent: "amplihack:amplihack:core:builder"
    description: |
      Build all 8 atlas layers in both Mermaid and Graphviz DOT formats:

      Layer 1 — Repository Surface: all source files, project structure, build systems
      Layer 2 — Runtime Topology: services, containers, ports, inter-service connections
      Layer 3 — Compile-time Dependencies: imports, packages, circular dependency detection
      Layer 4 — API Contracts: HTTP routes, gRPC services, GraphQL schemas, DTOs, middleware chains
      Layer 5 — Data Flow: DTO-to-storage chain, transformation steps
      Layer 6 — User Journey Scenarios: entry-point to outcome, minimum 3 journeys
      Layer 7 — Service Component Architecture: per-service module/package diagrams
        - SEC-11: sanitise service names to [a-zA-Z0-9_-]{1,64}
        - Delegate Python to code-visualizer skill
      Layer 8 — AST+LSP Symbol Bindings: cross-file references, dead code, interface mismatches
        - Mode from Step 1 (lsp-assisted or static-approximation)
        - SEC-12: sanitise LSP output; SEC-15: credential patterns

      For EACH layer, produce BOTH:
        - {layer-name}.mmd (Mermaid)
        - {layer-name}.dot (Graphviz DOT)
      Plus inventory tables where appropriate (Layer 6).

      Apply density guard at every diagram: >50 nodes OR >100 edges → ASK user (SEC-13/14).
      NEVER silently substitute a table for a diagram.
      Apply SEC-01 through SEC-19 throughout.

      Write to: {{output_dir}}/layer{N}-{name}/
    inputs:
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
      layers: "{{parameters.layers}}"
      diagram_formats: "{{parameters.diagram_formats}}"
      lsp_mode: "{{steps.validate-prerequisites.outputs.lsp_mode}}"
      density_threshold_nodes: "{{parameters.density_threshold_nodes}}"
      density_threshold_edges: "{{parameters.density_threshold_edges}}"
    depends_on:
      - "validate-prerequisites"
    condition: "validate_prerequisites"

  # ==========================================================================
  # STEP 3: BUG-HUNT — MERMAID ARM (parallel with Step 4)
  # Full 3-pass hunt using only Mermaid diagrams.
  # Experiment proved Mermaid finds different bugs than Graphviz (~85% unique).
  # ==========================================================================
  - id: "bug-hunt-mermaid"
    name: "Step 3: Bug-Hunt — Mermaid Arm"
    type: "agent"
    agent: "amplihack:amplihack:core:reviewer"
    parallel_group: "dual-format-hunt"
    description: |
      3-pass bug hunt using ONLY the Mermaid (.mmd) diagrams from Step 2.
      Do NOT read the .dot files — format independence is critical for finding different bugs.

      Pass 1 — Comprehensive Hunt: Read all 8 layer .mmd files. Check:
        - Route ↔ DTO mismatches (Layer 3 × Layer 4)
        - Orphaned/undead env vars (Layer 2 × Layer 6)
        - Dead runtime paths (Layer 2 × Layer 3)
        - Stale documentation contradictions
        - Layer 7 coupling issues; Layer 8 dead symbols and interface mismatches

      Pass 2 — Fresh Eyes: Re-read all .mmd files from scratch, ignoring Pass 1 conclusions.
        Cross-check Pass 1 findings: CONFIRMED / OVERTURNED / NEEDS_ATTENTION.

      Pass 3 — Scenario Deep-Dive: Trace each Layer 5 journey through Layers 3,4,2,7,8.
        Produce per-journey verdict: PASS / FAIL / NEEDS_ATTENTION.

      SEC-09: credential redaction in all evidence. SEC-16: relative paths only.
      Write to: {{output_dir}}/bug-reports/mermaid-arm/
    inputs:
      atlas_path: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      format: "mermaid"
    condition: "bug_hunt == True"
    depends_on:
      - "build-all-layers"

  # ==========================================================================
  # STEP 4: BUG-HUNT — GRAPHVIZ ARM (parallel with Step 3)
  # Full 3-pass hunt using only Graphviz DOT diagrams.
  # ==========================================================================
  - id: "bug-hunt-graphviz"
    name: "Step 4: Bug-Hunt — Graphviz Arm"
    type: "agent"
    agent: "amplihack:amplihack:core:reviewer"
    parallel_group: "dual-format-hunt"
    description: |
      3-pass bug hunt using ONLY the Graphviz DOT (.dot) diagrams from Step 2.
      Do NOT read the .mmd files — format independence is critical for finding different bugs.

      Same 3-pass structure as Step 3 (Mermaid arm), but reading .dot files.
      The explicit A -> B [label="..."] syntax forces different reasoning paths,
      surfacing structural/architectural bugs that Mermaid's abbreviated syntax misses.

      SEC-09: credential redaction. SEC-16: relative paths only.
      Write to: {{output_dir}}/bug-reports/graphviz-arm/
    inputs:
      atlas_path: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      format: "dot"
    condition: "bug_hunt == True"
    depends_on:
      - "build-all-layers"

  # ==========================================================================
  # STEP 5: MERGE AND DEDUPLICATE BUG FINDINGS
  # Union of both arms, dedup by file:line, assign final severity.
  # ==========================================================================
  - id: "merge-bug-findings"
    name: "Step 5: Merge and Deduplicate Bug Findings"
    type: "agent"
    agent: "amplihack:amplihack:core:reviewer"
    description: |
      Merge findings from both the Mermaid and Graphviz arms:

      1. Read all bug reports from both arms
      2. Deduplicate by file:line — bugs found by BOTH arms flagged as "dual-format confirmed" (higher confidence, but severity determined by reviewers in Step 6)
      3. Bugs found by only one arm keep original severity
      4. Produce merged report with provenance (mermaid-only / graphviz-only / both)
      5. Count: total unique, mermaid-only, graphviz-only, shared

      Write merged report to: {{output_dir}}/bug-reports/merged-findings.md
      Write individual issue files to: {{output_dir}}/bug-reports/issues/
    inputs:
      mermaid_reports: "{{steps.bug-hunt-mermaid.outputs.bug_report_paths}}"
      graphviz_reports: "{{steps.bug-hunt-graphviz.outputs.bug_report_paths}}"
      codebase_path: "{{parameters.codebase_path}}"
    condition: "bug_hunt == True"
    depends_on:
      - "bug-hunt-mermaid"
      - "bug-hunt-graphviz"

  # ==========================================================================
  # STEP 6: MULTI-AGENT FALSE POSITIVE ELIMINATION
  # Three specialist agents independently validate each bug.
  # A bug must receive 2/3 CONFIRMED votes to be filed as an issue.
  # This prevents wasting developer time on false positives.
  # ==========================================================================
  - id: "validate-bugs-security"
    name: "Step 6a: Validate Bugs — Security Specialist"
    type: "agent"
    agent: "amplihack:amplihack:specialized:security"
    parallel_group: "bug-validation"
    description: |
      Security specialist reviews each merged bug finding independently.
      For each bug, read the actual source code at file:line and determine:

      - CONFIRMED: The bug is real. The code at file:line has the described problem.
        Include a one-line explanation of WHY it's a bug.
      - FALSE_POSITIVE: The bug is not real. The code is correct.
        Include a one-line explanation of WHY the finding was wrong.
      - UNCERTAIN: Cannot determine from available evidence.

      Focus on: error handling, input validation, security implications,
      fail-closed behavior, credential exposure, injection risks.

      Write verdicts to: {{output_dir}}/bug-reports/validation/security-verdicts.md
    inputs:
      merged_findings: "{{steps.merge-bug-findings.outputs}}"
      codebase_path: "{{parameters.codebase_path}}"
    condition: "bug_hunt == True"
    depends_on:
      - "merge-bug-findings"

  - id: "validate-bugs-architect"
    name: "Step 6b: Validate Bugs — Architecture Specialist"
    type: "agent"
    agent: "amplihack:amplihack:core:architect"
    parallel_group: "bug-validation"
    description: |
      Architecture specialist reviews each merged bug finding independently.
      For each bug, read the actual source code at file:line and determine:

      - CONFIRMED: The bug is real. The code at file:line has the described problem.
      - FALSE_POSITIVE: The bug is not real. The code is correct.
      - UNCERTAIN: Cannot determine from available evidence.

      Focus on: module boundaries, API contracts, dependency direction,
      encapsulation violations, naming inconsistencies, dead code, stale docs.

      Write verdicts to: {{output_dir}}/bug-reports/validation/architect-verdicts.md
    inputs:
      merged_findings: "{{steps.merge-bug-findings.outputs}}"
      codebase_path: "{{parameters.codebase_path}}"
    condition: "bug_hunt == True"
    depends_on:
      - "merge-bug-findings"

  - id: "validate-bugs-tester"
    name: "Step 6c: Validate Bugs — Testing Specialist"
    type: "agent"
    agent: "amplihack:amplihack:core:tester"
    parallel_group: "bug-validation"
    description: |
      Testing specialist reviews each merged bug finding independently.
      For each bug, read the actual source code at file:line and determine:

      - CONFIRMED: The bug is real. The code at file:line has the described problem.
        If possible, describe a test case that would expose the bug.
      - FALSE_POSITIVE: The bug is not real. The code is correct.
        Explain what the bug-hunter misunderstood.
      - UNCERTAIN: Cannot determine from available evidence.

      Focus on: edge cases, error paths, race conditions, resource leaks,
      type mismatches, unreachable code, off-by-one errors.

      Write verdicts to: {{output_dir}}/bug-reports/validation/tester-verdicts.md
    inputs:
      merged_findings: "{{steps.merge-bug-findings.outputs}}"
      codebase_path: "{{parameters.codebase_path}}"
    condition: "bug_hunt == True"
    depends_on:
      - "merge-bug-findings"

  # ==========================================================================
  # STEP 6d: TALLY VOTES AND FILTER
  # A bug needs >= 2 of 3 CONFIRMED votes to be filed.
  # UNCERTAIN counts as 0.5 (two UNCERTAINs + one CONFIRMED = filed).
  # ==========================================================================
  - id: "tally-validation-votes"
    name: "Step 6d: Tally Validation Votes"
    type: "agent"
    agent: "amplihack:amplihack:core:reviewer"
    description: |
      Tally votes from the three validation specialists:

      For each bug in the merged findings:
        1. Read verdicts from security, architect, and tester
        2. Score: CONFIRMED=1, UNCERTAIN=0.5, FALSE_POSITIVE=0
        3. Threshold: score >= 2.0 → VALIDATED (will be filed)
        4. Score < 2.0 → REJECTED (not filed, logged with reasons)

      Produce:
        - {{output_dir}}/bug-reports/validated-bugs.md — bugs that passed validation
        - {{output_dir}}/bug-reports/rejected-bugs.md — bugs that failed validation (will still be filed as issues with 'needs-review' label)
        - Summary: N validated, N rejected, N unanimous, false positive rate estimate

      Severity is determined by reviewer consensus, NOT automatically upgraded.
      If all 3 reviewers agree on HIGH, it's HIGH. If they disagree, use the median.
      Do NOT override reviewer judgment with automatic rules.
    inputs:
      security_verdicts: "{{steps.validate-bugs-security.outputs}}"
      architect_verdicts: "{{steps.validate-bugs-architect.outputs}}"
      tester_verdicts: "{{steps.validate-bugs-tester.outputs}}"
      merged_findings: "{{steps.merge-bug-findings.outputs}}"
    condition: "bug_hunt == True"
    depends_on:
      - "validate-bugs-security"
      - "validate-bugs-architect"
      - "validate-bugs-tester"

  # ==========================================================================
  # STEP 7a: ENSURE LABEL EXISTS
  # Create code-atlas-bughunt label if missing.
  # ==========================================================================
  - id: "ensure-label"
    name: "Step 7a: Ensure code-atlas-bughunt Label"
    type: "bash"
    command: |
      cd "{{parameters.codebase_path}}" && \
      echo "Ensuring labels exist..." && \
      (gh label list --json name -q '.[].name' | grep -q '^code-atlas-bughunt$' \
        || gh label create "code-atlas-bughunt" \
             --description "Bug found by /code-atlas graph-based bug hunt" \
             --color "D93F0B") && \
      (gh label list --json name -q '.[].name' | grep -q '^code-atlas-needs-review$' \
        || gh label create "code-atlas-needs-review" \
             --description "Finding from /code-atlas that did not pass multi-agent validation" \
             --color "FBCA04") && \
      echo "Labels ensured: code-atlas-bughunt, code-atlas-needs-review"
    condition: "bug_hunt == True"
    depends_on:
      - "tally-validation-votes"

  # ==========================================================================
  # STEP 7b: FILE ISSUES FOR VALIDATED BUGS ONLY
  # Only bugs that passed multi-agent validation (>= 2/3 votes) get filed.
  # Rejected bugs are logged but not filed — reduces developer noise.
  # ==========================================================================
  - id: "file-issues"
    name: "Step 7b: File GitHub Issues for Validated Bugs"
    type: "agent"
    agent: "amplihack:amplihack:core:builder"
    description: |
      File individual issues for validated bugs. File ONE summary issue for all rejected findings.
      All work tracking happens in issues — no findings are only in repo documents.

      For each VALIDATED bug (score >= 2.0) in {{output_dir}}/bug-reports/validated-bugs.md:
        1. Create issue via `gh issue create` with:
           - Title: "[code-atlas] {brief description}" (under 70 chars)
           - Body containing:
             - Severity (LOW/MEDIUM/HIGH)
             - File:line evidence (relative paths)
             - Provenance: found by mermaid-only / graphviz-only / both
             - Which pass found it (Pass 1/2/3)
             - Code quote with credential redaction (SEC-09)
           - Labels: bug, code-atlas-bughunt
         - Validation: "Validated by N/3 agents (security: X, architect: X, tester: X)"
        2. Log the created issue URL
        3. File every validated bug — no additional filtering
        4. One issue per bug — no batching

      For ALL rejected bugs (score < 2.0), file ONE summary issue:
        1. Title: "[code-atlas] Rejected findings summary — N items need human review"
        2. Body: table of all rejected findings with vote breakdowns and reasons
        3. Labels: code-atlas-needs-review
        4. This gives humans a single place to review and override agent consensus
           without creating N noise issues that dilute the validated findings

      After filing all issues, write the list of URLs to:
        {{output_dir}}/bug-reports/filed-issues.md
    inputs:
      validated_bugs: "{{steps.tally-validation-votes.outputs}}"
      codebase_path: "{{parameters.codebase_path}}"
      output_dir: "{{parameters.output_dir}}"
    condition: "bug_hunt == True"
    depends_on:
      - "ensure-label"

  # ==========================================================================
  # STEP 8: INGEST ATLAS INTO CODE GRAPH (Kuzu)
  # Map atlas layers, services, symbols, and bugs into the queryable graph.
  # Enables Cypher queries like "show all paths from login to database write"
  # or "which services are affected by this bug?"
  # ==========================================================================
  - id: "ingest-to-graph"
    name: "Step 8: Ingest Atlas into Code Graph"
    type: "agent"
    agent: "amplihack:amplihack:core:builder"
    description: |
      Ingest the atlas into the Kuzu code graph for queryable traversal.
      This connects atlas data to the existing code graph schema (CodeFile,
      CodeClass, CodeFunction, CALLS, IMPORTS, etc.) and adds atlas-specific
      nodes and relationships.

      New node tables (created if not exist):
        - AtlasLayer (layer_id, layer_number, name, diagram_path_mmd, diagram_path_dot, node_count, edge_count, built_at)
        - AtlasService (service_id, name, layer1_topology, layer7_component_count)
        - AtlasBug (bug_id, title, severity, file_path, line_number, provenance, pass_number, issue_url)

      New relationship tables:
        - ATLAS_MAPS (AtlasLayer → CodeFile) — which files each layer covers
        - SERVICE_CONTAINS (AtlasService → CodeFile) — service-to-file ownership
        - BUG_IN (AtlasBug → CodeFile) — bug location
        - BUG_IN_FUNCTION (AtlasBug → CodeFunction) — bug in specific function
        - LAYER_FOUND_BUG (AtlasLayer → AtlasBug) — which layer revealed each bug

      Ingestion steps:
        1. Check Kuzu connectivity (skip gracefully if not available)
        2. Create atlas schema tables (idempotent)
        3. For each layer: create AtlasLayer node, create ATLAS_MAPS edges to CodeFiles
        4. For each service (Layer 2): create AtlasService, link to CodeFiles via SERVICE_CONTAINS
        5. For each bug: create AtlasBug, link to CodeFile/CodeFunction via BUG_IN/BUG_IN_FUNCTION
        6. Link bugs to layers via LAYER_FOUND_BUG
        7. Report: N nodes created, N relationships created

      This enables queries like:
        - MATCH (b:AtlasBug)-[:BUG_IN]->(f:CodeFile) RETURN b.title, f.file_path
        - MATCH (s:AtlasService)-[:SERVICE_CONTAINS]->(f:CodeFile)<-[:DEFINED_IN]-(fn:CodeFunction)-[:CALLS]->(fn2:CodeFunction) RETURN s.name, fn.function_name, fn2.function_name
        - MATCH (l:AtlasLayer)-[:LAYER_FOUND_BUG]->(b:AtlasBug) WHERE b.severity = 'HIGH' RETURN l.name, b.title

      If Kuzu is not available, emit ATLAS_GRAPH_UNAVAILABLE (non-fatal) and skip.
    inputs:
      output_dir: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      merged_findings: "{{steps.merge-bug-findings.outputs}}"
      filed_issues: "{{steps.file-issues.outputs}}"
    depends_on:
      - "file-issues"

  # ==========================================================================
  # STEP 9: PUBLISH ATLAS
  # ==========================================================================
  - id: "publish-atlas"
    name: "Step 9: Publish Atlas"
    type: "skill"
    skill: "code-atlas"
    task: "publish"
    description: |
      Publish the completed atlas as a single set of pages with side-by-side diagrams:

      Each layer page (docs/atlas/layer{N}-{name}/README.md) contains:
        - Layer description and what it maps
        - Mermaid diagram (rendered inline for GitHub/mkdocs)
        - Graphviz diagram (linked SVG, rendered from .dot)
        - Link to diagram source files (.mmd and .dot)
        - Bug findings from both arms relevant to this layer

      Steps:
      1. Write docs/atlas/README.md index (links to all 8 layer pages + merged bug report)
      2. Write per-layer README.md with side-by-side Mermaid + Graphviz SVG
      3. Write docs/atlas/staleness-map.yaml (Glob → layer mappings for CI)
      4. Render SVG from .mmd (if mmdc available) and .dot (if dot available)
      5. If publish=true: push to GitHub Pages (SEC-19: sanitise credentials)
      6. Update mkdocs.yml nav if exists
    inputs:
      output_dir: "{{parameters.output_dir}}"
      codebase_path: "{{parameters.codebase_path}}"
      publish: "{{parameters.publish}}"
      tools_available: "{{steps.validate-prerequisites.outputs.tools_available}}"
    depends_on:
      - "ingest-to-graph"

  # ==========================================================================
  # STEP 10: SUMMARISE AND REPORT
  # ==========================================================================
  - id: "summarise-and-report"
    name: "Step 10: Summarise and Report"
    type: "skill"
    skill: "code-atlas"
    task: "summarise"
    description: |
      Final completion summary:
      1. Layers built: count and list
      2. Diagrams created: .mmd count, .dot count, .svg count
      3. Layer 7: N services mapped, components per service
      4. Layer 8: mode used, N dead symbols, N interface mismatches
      5. Bug hunt:
         - Mermaid arm: N findings
         - Graphviz arm: N findings
         - Merged unique: N (shared: N, mermaid-only: N, graphviz-only: N)
         - Validation: N validated, N needs-review (estimated false positive rate: N%)
         - Unanimous (3/3 confirmed): N — highest confidence
         - Issues filed: N validated + N needs-review = N total (all tracked in issues)
      6. Density guard activations: N
      7. Code graph: N atlas nodes ingested, N relationships created (or ATLAS_GRAPH_UNAVAILABLE)
      8. Example queries: 3 ready-to-run Cypher queries based on the bugs found
      9. Errors: SkillError codes emitted
      10. Next steps: rebuild commands, lsp-setup suggestion if static mode, graph queries to try
    inputs:
      output_dir: "{{parameters.output_dir}}"
