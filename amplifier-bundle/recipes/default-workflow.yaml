name: "default-workflow"
description: "Complete 23-step development workflow (Steps 0-22) with full agent orchestration"
version: "2.2.0"
author: "Amplihack Team"
tags: ["development", "feature", "bugfix", "refactoring", "standard", "full-workflow"]

# DEFAULT_WORKFLOW: Standard Development Workflow
#
# This is the primary workflow for all non-trivial code changes:
#   - New features
#   - Bug fixes
#   - Refactoring
#   - Any changes requiring review
#
# Phases:
#   1. Requirements Clarification (Steps 0-3)
#   2. Design (Steps 4-6)
#   3. Implementation (Steps 7-9)
#   4. Testing & Review (Steps 10-13)
#   5. Version & PR (Steps 14-16)
#   6. PR Review (Steps 17-18)
#   7. Merge (Steps 19-22)
#
# MANDATORY STEPS: 0, 14, 17, 18 - DO NOT SKIP
#
# Philosophy Alignment:
#   - Ruthless Simplicity: Each step has single clear purpose
#   - Zero-BS Implementation: No stubs or placeholders in deliverables
#   - Test-Driven Development: Write tests before implementation
#   - Modular Design: Clean module boundaries enforced through workflow
#
# Usage:
#   amplihack recipe run default-workflow \
#     -c task_description="Add user profile page" \
#     -c requirements="Display name, email, avatar; allow editing" \
#     -c repo_path="/path/to/repo"

recursion:
  max_depth: 6
  max_total_steps: 80

context:
  # Description of the task
  task_description: ""

  # Specific requirements (user-provided or empty)
  requirements: ""

  # Path to the repository
  repo_path: "."

  # Branch name prefix (default: feat)
  branch_prefix: "feat"

  # Max slug chars from task_description when deriving the branch name
  branch_slug_max_length: "50"

  # Max chars from task_description used in the commit subject after "feat: "
  commit_title_max_length: "66"

  # Workstream name for parallel workflows (optional)
  workstream: ""

  # Outputs populated during execution
  clarified_requirements: ""
  issue_number: ""
  branch_name: ""
  worktree_path: ""
  resume_checkpoint: ""
  resume_worktree_path: ""
  resume_branch_name: ""
  workstream_state_file: ""
  workstream_progress_file: ""
  design_spec: ""
  documentation: ""
  test_spec: ""
  implementation: ""
  refactored_code: ""
  pre_commit_review: ""
  review_feedback: ""
  pr_url: ""
  pr_review: ""
  pr_security_review: ""
  pr_philosophy_review: ""
  blocking_issues_addressed: ""
  pr_feedback_changes: ""
  philosophy_check: ""
  final_cleanup: ""
  quality_audit_results: ""
  ci_status: ""

steps:
  # ==========================================================================
  # STEP 0: WORKFLOW PREPARATION (MANDATORY - DO NOT SKIP)
  # Creates tracking structure for all 23 workflow steps.
  # CRITICAL: Must complete before ANY implementation work begins.
  # Prevents "completion bias" - ensures mandatory review steps (0, 14, 17-18) not skipped.
  # ==========================================================================
  - id: "step-00-workflow-preparation"
    type: "bash"
    command: |
      echo "=== WORKFLOW PREPARATION COMPLETE ==="
      echo ""
      echo "23-Step Workflow Initialized (with granular sub-steps for Steps 17-19):"
      echo "  Step 0: Workflow Preparation - CURRENT"
      echo "  Step 1: Prepare Workspace"
      echo "  Step 2: Rewrite/Clarify Requirements"
      echo "  Step 3: Create GitHub Issue"
      echo "  Step 4: Setup Worktree/Branch"
      echo "  Step 5: Research and Design"
      echo "  Step 6: Retcon Documentation"
      echo "  Step 7: TDD - Write Tests First"
      echo "  Step 8: Implement Solution"
      echo "  Step 9: Refactor and Simplify"
      echo "  Step 10: Review Before Commit"
      echo "  Step 11: Incorporate Feedback"
      echo "  Step 12: Run Pre-commit Hooks"
      echo "  Step 13: Mandatory Local Testing"
      echo "  Step 14: Bump Version (MANDATORY)"
      echo "  Step 15: Commit and Push"
      echo "  Step 16: Open PR as Draft"
      echo "  Step 17: Review the PR (MANDATORY - 6 sub-steps with verification gate)"
      echo "    17a: Step 13 Compliance Verification"
      echo "    17b: Comprehensive Code Review (reviewer agent)"
      echo "    17c: Security Review (security agent)"
      echo "    17d: Philosophy Guardian Review (philosophy-guardian agent)"
      echo "    17e: Address Blocking Issues (builder agent)"
      echo "    17f: Verification Gate"
      echo "  Step 18: Implement Review Feedback (MANDATORY - 5 sub-steps with verification gate)"
      echo "    18a: Analyze Feedback"
      echo "    18b: Implement Feedback (builder agent)"
      echo "    18c: Push Changes"
      echo "    18d: Respond to Comments"
      echo "    18e: Verification Gate"
      echo "  Step 19: Philosophy Compliance Check (4 sub-steps with verification gate)"
      echo "    19a: Philosophy Review (reviewer agent)"
      echo "    19b: Pattern Check (patterns agent)"
      echo "    19c: Zero-BS Verification"
      echo "    19d: Verification Gate"
      echo "  Step 20: Final Cleanup"
      echo "  Step 20c: Quality Audit Loop (3+ cycles, multi-agent validation)"
      echo "  Step 21: Convert PR to Ready"
      echo "  Step 22: Ensure PR Mergeable"
      echo ""
      # FIX (issues #3045/#3076/#3117): unquoted heredoc for safe variable capture.
      # Unquoted heredoc allows Rust runner env-var expansion ($RECIPE_VAR_*).
      # Shell expansion is single-pass: expanded values are NOT re-processed.
      TASK_DESC=$(cat <<EOFTASKDESC
      {{task_description}}
      EOFTASKDESC
      )
      printf 'Task: %s\n' "$TASK_DESC"
      printf 'Repository: %s\n' {{repo_path}}
    output: "workflow_init"

  # ==========================================================================
  # STEP 1: PREPARE THE WORKSPACE
  # Ensure a clean local environment that is up to date.
  # Actions: verify no unstashed changes, git fetch, check git status
  # ==========================================================================
  - id: "step-01-prepare-workspace"
    type: "bash"
    condition: "not resume_checkpoint"
    command: |
      cd "{{repo_path}}" && \
      echo "=== Step 1: Preparing Workspace ===" && \
      echo "" && \
      echo "Current directory: $(pwd)" && \
      echo "" && \
      echo "--- Git Status ---" && \
      git status && \
      echo "" && \
      echo "--- Fetching Latest ---" && \
      git fetch --all && \
      echo "" && \
      echo "--- Current Branch ---" && \
      git branch --show-current && \
      echo "" && \
      echo "=== Workspace Prepared ==="
    output: "workspace_status"

  # ==========================================================================
  # STEP 2: REWRITE AND CLARIFY REQUIREMENTS
  # ==========================================================================
  - id: "step-02-clarify-requirements"
    agent: "amplihack:prompt-writer"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 2: Rewrite and Clarify Requirements

      **Task Description:** {{task_description}}
      **Initial Requirements:** {{requirements}}

      Your role is to clarify and structure the task requirements.

      **Actions Required:**
      1. Identify explicit user requirements that CANNOT be optimized away
      2. Remove ambiguity from the task description
      3. Define clear success criteria
      4. Document acceptance criteria

      **Output Format:**
      ```json
      {
        "task_summary": "one-line clear summary",
        "explicit_requirements": ["list of must-have features"],
        "acceptance_criteria": ["how to verify completion"],
        "out_of_scope": ["what this does NOT include"],
        "assumptions": ["assumptions being made"],
        "questions_resolved": ["clarifications made autonomously"],
        "estimated_complexity": "low/medium/high",
        "classification": "feature/bugfix/refactor/other"
      }
      ```

      Use your best judgment to work autonomously. Pass explicit requirements to ALL subsequent agents.
    output: "clarified_requirements"
    parse_json: true

  - id: "step-02b-analyze-codebase"
    agent: "amplihack:architect"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 2b: Analyze Existing Codebase Context

      **Task:** {{task_description}}
      **Clarified Requirements:** {{clarified_requirements}}
      **Repository:** {{repo_path}}

      ## IMPORTANT: Emit progress markers throughout this analysis

      This step runs under a watchdog that times out if no output is seen for
      60+ seconds. You MUST emit a progress line before each major exploration
      phase so the recipe runner can see activity. Use this format:

      ```
      ## Progress: [Phase name] — [brief description]
      ```

      ## Exploration Phases

      Work through these phases in order, emitting a progress marker before each:

      **Phase 1 — Project structure**
      Print: `## Progress: Phase 1/4 — Scanning project structure`
      Use Glob to identify top-level layout, key config files (pyproject.toml,
      package.json, Cargo.toml, etc.), and source directory organization.

      **Phase 2 — Relevant code paths**
      Print: `## Progress: Phase 2/4 — Searching for task-relevant code`
      Use Grep to find code related to the task: relevant class/function names,
      imports, config keys, and patterns mentioned in the requirements.

      **Phase 3 — Dependencies and integration points**
      Print: `## Progress: Phase 3/4 — Analyzing dependencies and interfaces`
      Read key files (imports, interfaces, config) to understand how components
      connect. Identify external dependencies relevant to the task.

      **Phase 4 — Synthesis**
      Print: `## Progress: Phase 4/4 — Synthesizing findings`
      Compile findings into a structured summary.

      ## Output

      Provide a codebase context summary covering:
      1. Relevant existing code and patterns
      2. Files that will likely need modification
      3. Dependencies and integration points
      4. Potential conflicts or considerations

      Use glob and grep to explore the codebase. Avoid web searches.
    timeout: 600
    output: "codebase_analysis"

  - id: "step-02c-resolve-ambiguity"
    agent: "amplihack:ambiguity"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 2c: Resolve Any Remaining Ambiguity

      **Task:** {{task_description}}
      **Clarified Requirements:** {{clarified_requirements}}
      **Codebase Analysis:** {{codebase_analysis}}

      Review for any remaining ambiguity in the requirements.

      If ambiguity exists:
      - Resolve it using best judgment
      - Document the decisions made
      - Explain rationale

      If no ambiguity:
      - Confirm requirements are clear
      - Proceed with confidence

      Output final, unambiguous requirements ready for design phase.
    timeout: 300
    output: "final_requirements"

  # ==========================================================================
  # STEP 3: CREATE GITHUB ISSUE
  # Create a GitHub issue documenting the task with problem description,
  # requirements, constraints, success criteria, and appropriate labels.
  # ==========================================================================
  - id: "step-03-create-issue"
    type: "bash"
    condition: "not issue_number"
    command: |
      set -euo pipefail
      cd "{{repo_path}}"

      # detect_git_provider: returns "ado" for dev.azure.com/visualstudio.com remotes, "github" otherwise
      # NOTE: Same logic as step-16-create-draft-pr. step-16 uses a pre-cached $REMOTE_URL
      #       (avoids a second git subprocess); here we capture inline since there is no prior cache.
      #       Keep detection logic in sync across both steps; they run in separate bash shells.
      detect_git_provider() {
        local remote_url
        remote_url=$(git remote get-url origin 2>/dev/null || echo '')
        if [[ "$remote_url" == *"dev.azure.com"* ]] || [[ "$remote_url" == *"visualstudio.com"* ]]; then
          echo "ado"
        else
          echo "github"
        fi
      }
      GIT_PROVIDER=$(detect_git_provider)
      echo "=== Step 3: Creating Issue/Work Item (provider: $GIT_PROVIDER) ===" >&2

      # FIX (#3045/#3076/#3117): heredoc capture — prevents echo metacharacter injection.
      # SECURITY: single-quoted heredoc delimiter prevents bash from expanding $() / backticks
      # in template-substituted content. {{variable}} substitution is performed by the Rust runner
      # before bash executes, so quoted delimiters are safe and correct here.
      TASK_DESC=$(cat <<'EOFTASKDESC'
      {{task_description}}
      EOFTASKDESC
      )
      # Bash builtins replace tr|cut pipeline — avoids 2 subprocess spawns (matches step-16)
      ISSUE_TITLE="${TASK_DESC//$'\n'/ }"
      ISSUE_TITLE="${ISSUE_TITLE//$'\r'/ }"
      if [ "${#ISSUE_TITLE}" -gt 200 ]; then
        echo "WARN: Truncating issue/work item title to 200 characters for provider compatibility" >&2
        ISSUE_TITLE="${ISSUE_TITLE:0:200}"
      fi
      ISSUE_REQS=$(cat <<'EOFREQS'
      {{final_requirements}}
      EOFREQS
      )
      ISSUE_BODY=$(printf '## Task Description\n%s\n\n## Requirements\n%s\n\n## Acceptance Criteria\n- [ ] All explicit requirements met\n- [ ] Tests passing\n- [ ] Philosophy compliant\n- [ ] Documentation updated\n\n## Classification\nGenerated via default-workflow recipe\n' "$TASK_DESC" "$ISSUE_REQS")

      if [ "$GIT_PROVIDER" = "ado" ]; then
        # ── ADO PATH ────────────────────────────────────────────────────────
        # Pre-flight: verify az CLI is authenticated before making API calls
        if ! az account show >/dev/null 2>&1; then
          echo "ERROR: Azure CLI not authenticated. Run 'az login' first." >&2
          exit 1
        fi
        # Idempotency Guard 1: Reuse work item referenced in task_description (#NNNN)
        if [[ "$TASK_DESC" =~ \#([0-9]+) ]]; then
          REF_ITEM_NUM="${BASH_REMATCH[1]}"
        else
          REF_ITEM_NUM=""
        fi
        case "$REF_ITEM_NUM" in
          ''|*[!0-9]*) REF_ITEM_NUM="" ;;
        esac
        if [ -n "$REF_ITEM_NUM" ]; then
          echo "INFO: task_description references work item #$REF_ITEM_NUM — verifying it exists" >&2
          EXISTING_ID=$(timeout 60 az boards work-item show --id "$REF_ITEM_NUM" --query id -o tsv 2>/dev/null || echo '')
          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "None" ]; then
            echo "INFO: Reusing existing work item #$REF_ITEM_NUM — skipping creation" >&2
            printf '_workitems/edit/%s\n' "$REF_ITEM_NUM"
            exit 0
          fi
          echo "WARN: Referenced work item #$REF_ITEM_NUM not found — will create" >&2
        fi

        # Idempotency Guard 2: Search open ADO work items for matching title
        # SECURITY: strip injection-significant chars from search title before query
        SEARCH_TITLE="$ISSUE_TITLE"
        if [ "${#SEARCH_TITLE}" -gt 100 ]; then
          echo "WARN: Truncating ADO work item search title to 100 characters for WIQL lookup" >&2
          SEARCH_TITLE="${SEARCH_TITLE:0:100}"
        fi
        SEARCH_TITLE="${SEARCH_TITLE//\'/\'\'}"          # escape single quotes
        SEARCH_TITLE="${SEARCH_TITLE//[/}"               # strip [ (field reference syntax)
        SEARCH_TITLE="${SEARCH_TITLE//]/}"               # strip ] (field reference syntax)
        SEARCH_TITLE="${SEARCH_TITLE//;/}"               # strip ; (statement terminators)
        if [ -n "$SEARCH_TITLE" ]; then
          echo "INFO: Searching open ADO work items for similar title" >&2
          EXISTING_ADO_ID=$(timeout 60 az boards query \
            --wiql "SELECT [System.Id] FROM WorkItems WHERE [System.Title] = '$SEARCH_TITLE' AND [System.State] <> 'Closed'" \
            --query '[0].id' -o tsv 2>/dev/null || echo '')
          if [ -n "$EXISTING_ADO_ID" ] && [ "$EXISTING_ADO_ID" != "None" ]; then
            echo "INFO: Found existing open work item matching title — skipping creation" >&2
            printf '_workitems/edit/%s\n' "$EXISTING_ADO_ID"
            exit 0
          fi
          echo "INFO: No matching open work item found — proceeding to create" >&2
        fi

        # Normal ADO path: create work item of type Task
        NEW_ITEM_ID=$(timeout 60 az boards work-item create \
          --type "Task" \
          --title "$ISSUE_TITLE" \
          --description "$ISSUE_BODY" \
          --query id \
          -o tsv 2>/dev/null || echo '')
        if [ -z "$NEW_ITEM_ID" ] || [ "$NEW_ITEM_ID" = "None" ]; then
          echo "ERROR: Failed to create ADO work item (az boards work-item create returned empty)" >&2
          exit 1
        fi
        # SECURITY: Validate az output is numeric before use — guards against unexpected az output
        case "$NEW_ITEM_ID" in
          ''|*[!0-9]*) echo "ERROR: ADO work item ID is not numeric: $NEW_ITEM_ID" >&2; exit 1 ;;
        esac
        echo "INFO: Created ADO work item #$NEW_ITEM_ID" >&2
        # Emit URL-like path that step-03b can extract the numeric ID from
        printf '_workitems/edit/%s\n' "$NEW_ITEM_ID"
      else
        # ── GITHUB PATH ─────────────────────────────────────────────────────
        # Idempotency Guard 1: Reuse issue referenced in task_description (#NNNN)
        # Mirrors step-16-create-draft-pr idempotency pattern (#3324).
        # Bash regex replaces printf|grep|head|tr pipeline — avoids 4 subprocess spawns
        if [[ "$TASK_DESC" =~ \#([0-9]+) ]]; then
          REF_ISSUE_NUM="${BASH_REMATCH[1]}"
        else
          REF_ISSUE_NUM=""
        fi
        # Defense-in-depth: validate numeric before interpolating into gh command
        case "$REF_ISSUE_NUM" in
          ''|*[!0-9]*) REF_ISSUE_NUM="" ;;
        esac
        if [ -n "$REF_ISSUE_NUM" ]; then
          echo "INFO: task_description references issue #$REF_ISSUE_NUM — verifying it exists" >&2
          EXISTING_URL=$(timeout 60 gh issue view "$REF_ISSUE_NUM" --json url --jq '.url // ""' 2>/dev/null || echo '')
          if [ -n "$EXISTING_URL" ]; then
            echo "INFO: Reusing existing issue #$REF_ISSUE_NUM — skipping creation" >&2
            printf '%s\n' "$EXISTING_URL"
            exit 0
          fi
          echo "WARN: Referenced issue #$REF_ISSUE_NUM not found — will search or create" >&2
        fi

        # Idempotency Guard 2: Search open issues for similar title
        SEARCH_QUERY="$ISSUE_TITLE"
        if [ "${#SEARCH_QUERY}" -gt 100 ]; then
          echo "WARN: Truncating GitHub issue search query to 100 characters for issue search" >&2
          SEARCH_QUERY="${SEARCH_QUERY:0:100}"
        fi
        if [ -n "$SEARCH_QUERY" ]; then
          echo "INFO: Searching open issues for similar title" >&2
          FOUND_URL=$(timeout 60 gh issue list --state open --search "$SEARCH_QUERY" --json url --jq '.[0].url // ""' 2>/dev/null || echo '')
          if [ -n "$FOUND_URL" ]; then
            echo "INFO: Found existing open issue matching title — skipping creation" >&2
            printf '%s\n' "$FOUND_URL"
            exit 0
          fi
          echo "INFO: No matching open issue found — proceeding to create" >&2
        fi

        # Normal path: create a new issue (label creation is GitHub-only)
        LABEL_NAME="workflow:default"
        if ! gh label list --limit 1000 2>/dev/null | grep -qw "$LABEL_NAME"; then
          LABEL_CREATE_OUTPUT=""
          if ! LABEL_CREATE_OUTPUT=$(gh label create "$LABEL_NAME" \
            --color "0366d6" \
            --description "Created by default-workflow recipe" 2>&1); then
            if printf '%s\n' "$LABEL_CREATE_OUTPUT" | grep -qi "already exists"; then
              echo "INFO: Label '$LABEL_NAME' already exists — continuing" >&2
            else
              echo "ERROR: Failed to create GitHub label '$LABEL_NAME'" >&2
              printf '%s\n' "$LABEL_CREATE_OUTPUT" >&2
              exit 1
            fi
          fi
        fi
        gh issue create \
          --title "$ISSUE_TITLE" \
          --body "$ISSUE_BODY" \
          --label "$LABEL_NAME" 2>&1 || \
        gh issue create \
          --title "$ISSUE_TITLE" \
          --body "$ISSUE_BODY"
      fi
    output: "issue_creation"
    parse_json: false
  - id: "step-03b-extract-issue-number"
    type: "bash"
    condition: "not issue_number"
    command: |
      # Extract issue number from the creation output.
      # FIX (issue #3022): Use safe heredoc capture instead of echo {{variable}} to
      # prevent shell metacharacter injection from issue body content.  Use head -1
      # instead of tail -1 so the canonical URL (first match) wins — not a trailing
      # noise number captured via 2>&1 in step-03a.  Also scan task_description
      # and PR metadata so mixed PR URLs, issue URLs, and #NNNN references resolve
      # to the actual issue number instead of a related PR number.
      # EOFISSUECREATION delimiter is intentionally long/specific to prevent accidental
      # collision with issue body text that might contain common delimiters like "EOF".
      ISSUE_CREATION=$(cat <<'EOFISSUECREATION'
      {{issue_creation}}
      EOFISSUECREATION
      )
      # FIX (count): Use Rust runner env var directly — step-03b is not in AFFECTED_STEP_IDS
      # so adding another EOFTASKDESC heredoc would break the heredoc count test.
      TASK_DESC="${RECIPE_VAR_task_description:-}"
      # Use a Python timeout wrapper instead of GNU `timeout` so local macOS runs
      # do not silently skip issue resolution when coreutils is absent.
      GH_TIMEOUT_SECONDS="${AMPLIHACK_WORKFLOW_GH_TIMEOUT_SECONDS:-60}"
      gh_with_timeout() {
        GH_TIMEOUT_SECONDS="$GH_TIMEOUT_SECONDS" python3 - "$@" <<'PY'
      import os
      import subprocess
      import sys

      raw_timeout = os.environ.get("GH_TIMEOUT_SECONDS", "60")
      try:
          timeout = int(raw_timeout)
          if timeout <= 0:
              raise ValueError("timeout must be positive")
      except ValueError:
          print(
              f"WARNING: invalid AMPLIHACK_WORKFLOW_GH_TIMEOUT_SECONDS={raw_timeout!r}; using 60",
              file=sys.stderr,
          )
          timeout = 60

      cmd = sys.argv[1:]
      if not cmd:
          raise SystemExit(0)

      try:
          result = subprocess.run(
              cmd,
              capture_output=True,
              text=True,
              timeout=timeout,
              check=False,
          )
      except subprocess.TimeoutExpired:
          print(f"INFO: {' '.join(cmd[:3])} timed out after {timeout}s", file=sys.stderr)
          raise SystemExit(0)
      except OSError as exc:
          print(f"INFO: could not run {cmd[0]}: {exc}", file=sys.stderr)
          raise SystemExit(0)

      if result.returncode != 0:
          stderr = (result.stderr or "").strip()
          if stderr:
              print(
                  f"INFO: {' '.join(cmd[:3])} returned {result.returncode}: {stderr}",
                  file=sys.stderr,
              )
          raise SystemExit(0)

      sys.stdout.write(result.stdout)
      PY
      }
      # FIX (#4205): Also match ADO work item URLs: _workitems/edit/NNNN
      # Fallback: bare numeric ID (e.g. from az boards work-item create --query id output)
      # FIX (#4344, #4326, #4308, #4307, #4316, #4303): Improved priority chain:
      #   1. Direct issue/ADO URL  2. #NNN hash refs (verified as issues)
      #   3. PR URL → resolve linked issue  4. #NNN that are PRs → resolve linked issue
      #   5. Bare numeric ID  6. Accept unresolved PR number as last resort
      COMBINED_TEXT=$(printf '%s\n%s' "$ISSUE_CREATION" "$TASK_DESC")

      # --- Priority 1: Direct issue URL or ADO work item URL ---
      EXTRACTED=$(printf '%s' "$COMBINED_TEXT" | grep -oE '(issues|_workitems/edit)/[0-9]+' | grep -oE '[0-9]+' | head -1)

      # --- Priority 2: #NNN hash references — verify each is an issue (not a PR) ---
      if [ -z "$EXTRACTED" ]; then
        REF_CANDIDATES=$(COMBINED_TEXT="$COMBINED_TEXT" python3 - <<'PY'
      import os
      import re

      text = os.environ.get("COMBINED_TEXT", "")
      seen = set()
      for match in re.finditer(r'(?<![A-Za-z0-9_/-])#([0-9]+)\b', text):
          candidate = match.group(1)
          if candidate not in seen:
              print(candidate)
              seen.add(candidate)
      PY
        )
        PR_CANDIDATES=""
        if [ -n "$REF_CANDIDATES" ]; then
          echo "INFO: step-03b resolving issue number from hash references" >&2
          while IFS= read -r candidate; do
            [ -n "$candidate" ] || continue
            CANDIDATE_URL=$(gh_with_timeout gh issue view "$candidate" --json url --jq '.url // ""')
            case "$CANDIDATE_URL" in
              */issues/*)
                EXTRACTED="$candidate"
                break
                ;;
              */pull/*)
                # Remember PR candidates for Priority 4 fallback
                PR_CANDIDATES="${PR_CANDIDATES:+$PR_CANDIDATES
      }$candidate"
                ;;
            esac
          done < <(printf '%s\n' "$REF_CANDIDATES")
        fi
      fi

      # --- Priority 3: PR URL in text → resolve linked issue ---
      if [ -z "$EXTRACTED" ]; then
        PR_NUMBER=$(printf '%s' "$COMBINED_TEXT" | grep -oE 'pull/[0-9]+' | grep -oE '[0-9]+' | head -1)
        if [ -n "$PR_NUMBER" ]; then
          echo "INFO: step-03b resolving linked issue from PR URL #$PR_NUMBER" >&2
          EXTRACTED=$(gh_with_timeout gh pr view "$PR_NUMBER" --json closingIssuesReferences --jq '.closingIssuesReferences[0].number // ""')
          # If closingIssuesReferences is empty, remember this PR for last-resort
          if [ -z "$EXTRACTED" ]; then
            PR_CANDIDATES="${PR_CANDIDATES:+$PR_CANDIDATES
      }$PR_NUMBER"
          fi
        fi
      fi

      # --- Priority 4: #NNN refs that were PRs → resolve their linked issues ---
      if [ -z "$EXTRACTED" ] && [ -n "$PR_CANDIDATES" ]; then
        echo "INFO: step-03b resolving linked issues from PR candidates" >&2
        while IFS= read -r pr_candidate; do
          [ -n "$pr_candidate" ] || continue
          LINKED=$(gh_with_timeout gh pr view "$pr_candidate" --json closingIssuesReferences --jq '.closingIssuesReferences[0].number // ""')
          if [ -n "$LINKED" ]; then
            EXTRACTED="$LINKED"
            break
          fi
        done < <(printf '%s\n' "$PR_CANDIDATES")
      fi

      # --- Priority 5: Bare numeric ID on its own line ---
      if [ -z "$EXTRACTED" ]; then
        EXTRACTED=$(printf '%s' "$COMBINED_TEXT" | grep -oE '^[0-9]+$' | head -1)
      fi

      # --- Priority 6 (last resort): Accept first PR number with warning ---
      if [ -z "$EXTRACTED" ] && [ -n "$PR_CANDIDATES" ]; then
        EXTRACTED=$(printf '%s\n' "$PR_CANDIDATES" | head -1)
        echo "WARNING: step-03b could not resolve a linked issue; using PR number #$EXTRACTED as issue reference" >&2
      fi

      case "$EXTRACTED" in
        ''|*[!0-9]*)
        echo "ERROR: step-03b failed to extract issue number from issue_creation output." >&2
        echo "Raw issue_creation output was:" >&2
        printf '%s\n' "$ISSUE_CREATION" >&2
        echo "This means step-03a (create-issue) likely failed or returned unexpected output." >&2
        echo "Downstream steps (commit, PR) will fail without a valid issue number." >&2
        exit 1
        ;;
      esac
      printf '%s' "$EXTRACTED"
    output: "issue_number"

  # ==========================================================================
  # STEP 4: SETUP WORKTREE AND BRANCH
  # Creates isolated worktree and outputs structured JSON for subsequent steps.
  # ==========================================================================
  - id: "step-04-setup-worktree"
    type: "bash"
    condition: "not resume_checkpoint"
    command: |
      set -euo pipefail
      # Guard: fail-fast if repo_path does not exist (prevents path traversal, catches misconfiguration).
      if [ ! -d "{{repo_path}}" ]; then
        echo "ERROR: repo_path '{{repo_path}}' does not exist or is not a directory" >&2
        exit 1
      fi
      cd "{{repo_path}}"

      echo "=== Step 4: Creating Worktree and Branch ===" >&2
      echo "" >&2

      # Fetch latest refs (guarded — skip if no remote configured)
      HAS_REMOTE=false
      BASE_BRANCH="main"
      BASE_WORKTREE_REF="HEAD"
      if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
        echo "ERROR: No commits in repository — create an initial commit before running the workflow." >&2
        exit 1
      fi
      if git remote get-url origin >/dev/null 2>&1; then
        HAS_REMOTE=true
        ORIGIN_HEAD_REF=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null || echo '')
        if [ -n "$ORIGIN_HEAD_REF" ]; then
          BASE_BRANCH="${ORIGIN_HEAD_REF##*/}"
          BASE_WORKTREE_REF="origin/$BASE_BRANCH"
          git fetch origin "$BASE_BRANCH" >&2
        elif git show-ref --verify --quiet "refs/remotes/origin/main"; then
          BASE_BRANCH="main"
          BASE_WORKTREE_REF="origin/main"
          git fetch origin main >&2
        else
          echo "INFO: origin/HEAD not configured and origin/main missing — using local HEAD as worktree base" >&2
        fi
      else
        echo "INFO: No remote configured — using local HEAD as worktree base" >&2
      fi

      # FIX (issue #4414): honor the caller's current feature branch.
      # If repo_path HEAD is on a non-default branch (i.e. the caller has
      # already started work on a feature branch and possibly committed to
      # it), use that branch's HEAD as the worktree base instead of
      # origin/<default>. Otherwise the recipe would silently branch from
      # origin/<default> and discard the caller's committed work.
      CURRENT_BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || echo '')
      if [ -n "$CURRENT_BRANCH" ] && [ "$CURRENT_BRANCH" != "$BASE_BRANCH" ]; then
        echo "INFO: caller's current branch '$CURRENT_BRANCH' differs from default '$BASE_BRANCH' — using HEAD as worktree base to preserve any committed work." >&2
        BASE_WORKTREE_REF="HEAD"
      fi

      # NOTE: This slug pipeline is duplicated in consensus-workflow.yaml step3-setup-worktree
      # with a 30-char limit instead of 50. If you update this pipeline (e.g. security patch),
      # update consensus-workflow.yaml in the same commit. See Issue #2952 for context.
      #
      # Generate branch name from task description.
      # FIX (issue #3087): Use UNQUOTED heredoc so the Rust recipe runner's
      # env-var expansion ($RECIPE_VAR_task_description) works correctly.
      # Single-quoted heredoc (<<'EOF') prevented variable expansion, producing
      # garbled branch names like "feat/issue--recipevartaskdescription".
      # Security note: the sanitization pipeline (tr -cd 'a-z0-9-') strips all
      # shell metacharacters from the output, mitigating injection risk.
      TASK_DESC=$(cat <<EOFTASKDESC
      {{task_description}}
      EOFTASKDESC
      )
      BRANCH_SLUG_MAX_LENGTH="{{branch_slug_max_length}}"
      if ! [[ "$BRANCH_SLUG_MAX_LENGTH" =~ ^[0-9]+$ ]] || [ "$BRANCH_SLUG_MAX_LENGTH" -le 0 ]; then
        echo "ERROR: branch_slug_max_length must be a positive integer, got '$BRANCH_SLUG_MAX_LENGTH'" >&2
        exit 1
      fi
      RAW_TASK_SLUG=$(printf '%s' "$TASK_DESC" | tr '\n\r' '  ' | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9-' | sed 's/-\{2,\}/-/g' | sed 's/^-//;s/-$//')
      if [ "${#RAW_TASK_SLUG}" -gt "$BRANCH_SLUG_MAX_LENGTH" ]; then
        echo "WARN: Truncating branch slug to $BRANCH_SLUG_MAX_LENGTH characters" >&2
      fi
      TASK_SLUG=$(printf '%.*s' "$BRANCH_SLUG_MAX_LENGTH" "$RAW_TASK_SLUG")
      TASK_SLUG="${TASK_SLUG%-}"
      # Guard: empty slug (blank/all-symbol input) produces a trailing-hyphen branch that
      # git check-ref-format accepts as valid but is undesirable. Catch it explicitly first.
      if [ -z "$TASK_SLUG" ]; then
        echo "WARNING: task_description produced an empty slug — falling back to task-unnamed" >&2
        # FIX (issue #3023 / BL-002 fallback hardening): Use hardcoded 'feat/' prefix rather
        # than {{branch_prefix}} to prevent injection via an invalid or malicious branch_prefix
        # value (e.g. '; rm -rf /' or '../../etc'). The prefix is not user-configurable in
        # the fallback path; configurable prefix only applies when a valid slug exists.
        BRANCH_NAME="feat/task-unnamed-$(date +%s)"
      else
        BRANCH_NAME="{{branch_prefix}}/issue-{{issue_number}}-${TASK_SLUG}"
        # Validate with authoritative git ref checker; fall back to safe unique name on failure
        if ! git check-ref-format --branch "${BRANCH_NAME}" >/dev/null 2>&1; then
          echo "WARNING: derived branch name '${BRANCH_NAME}' is invalid — falling back to task-unnamed" >&2
          BRANCH_NAME="feat/task-unnamed-$(date +%s)"
        fi
      fi
      WORKTREE_PATH="{{repo_path}}/worktrees/${BRANCH_NAME}"

      echo "Branch: ${BRANCH_NAME}" >&2
      echo "Worktree: ${WORKTREE_PATH}" >&2
      echo "" >&2

      # --- Idempotency: detect existing branch and/or worktree ---
      # FIX (issue #3023 / BL-002): Three-state guard makes re-runs safe.
      # FIX (issue #4289): Added git worktree prune and orphaned directory cleanup
      # to handle stale worktree state left by recovery runs.
      # State 1: branch + worktree both exist → reuse silently, emit created=false
      # State 2: branch exists but worktree missing → add worktree without -b
      # State 3: neither exists → full create path (original behaviour)
      #
      # Security note: grep -F is required (not -E/-P) so that filesystem path
      # characters (., +, *) in WORKTREE_PATH are not interpreted as regex metacharacters.

      # Prune stale worktree references left by interrupted/recovery runs.
      git worktree prune >&2

      BRANCH_EXISTS=$(git branch --list "${BRANCH_NAME}")
      WORKTREE_EXISTS=$(git worktree list --porcelain | grep -Fx "worktree ${WORKTREE_PATH}" || true)

      if [ -n "$BRANCH_EXISTS" ] && [ -n "$WORKTREE_EXISTS" ]; then
        # FIX (issue #4254): Verify the existing worktree tracks the correct base branch.
        # When a re-run targets the same issue from a different base (e.g., user switches
        # from main to a feature branch), the stale worktree has wrong-base diffs.
        # Detect by checking if BASE_WORKTREE_REF is an ancestor of the branch tip.
        WORKTREE_BASE_OK=true
        if [ "$BASE_WORKTREE_REF" != "HEAD" ]; then
          BRANCH_TIP=$(git rev-parse "${BRANCH_NAME}" 2>/dev/null || echo "")
          BASE_COMMIT=$(git rev-parse "${BASE_WORKTREE_REF}" 2>/dev/null || echo "")
          if [ -n "$BRANCH_TIP" ] && [ -n "$BASE_COMMIT" ]; then
            # Check if the base is an ancestor of the branch — if not, the worktree
            # was created from a different base and must be recreated.
            if ! git merge-base --is-ancestor "$BASE_COMMIT" "$BRANCH_TIP" 2>/dev/null; then
              WORKTREE_BASE_OK=false
              echo "WARN: Worktree '${WORKTREE_PATH}' was created from a different base branch." >&2
              echo "WARN: Expected base '${BASE_WORKTREE_REF}' (${BASE_COMMIT:0:12}) is not an ancestor of branch tip (${BRANCH_TIP:0:12})." >&2
              echo "INFO: Removing stale worktree and branch to recreate from correct base." >&2
            fi
          fi
        fi
        if [ "$WORKTREE_BASE_OK" = true ]; then
          echo "INFO: Branch '${BRANCH_NAME}' and worktree '${WORKTREE_PATH}' already exist — reusing." >&2
          CREATED=false
        else
          # Remove the stale worktree and branch, then fall through to State 3 (full create)
          git worktree remove --force "${WORKTREE_PATH}" >&2 2>/dev/null || rm -rf "${WORKTREE_PATH}"
          git branch -D "${BRANCH_NAME}" >&2 2>/dev/null || true
          git worktree prune >&2
          echo "INFO: Creating new branch and worktree from correct base." >&2
          git worktree add "${WORKTREE_PATH}" -b "${BRANCH_NAME}" "$BASE_WORKTREE_REF" >&2
          CREATED=true
        fi
      elif [ -n "$BRANCH_EXISTS" ] && [ -z "$WORKTREE_EXISTS" ]; then
        echo "INFO: Branch '${BRANCH_NAME}' exists but worktree is missing — adding worktree without -b." >&2
        # FIX (issue #4254): Also verify base branch before reattaching
        REATTACH_OK=true
        if [ "$BASE_WORKTREE_REF" != "HEAD" ]; then
          BRANCH_TIP=$(git rev-parse "${BRANCH_NAME}" 2>/dev/null || echo "")
          BASE_COMMIT=$(git rev-parse "${BASE_WORKTREE_REF}" 2>/dev/null || echo "")
          if [ -n "$BRANCH_TIP" ] && [ -n "$BASE_COMMIT" ]; then
            if ! git merge-base --is-ancestor "$BASE_COMMIT" "$BRANCH_TIP" 2>/dev/null; then
              REATTACH_OK=false
              echo "WARN: Branch '${BRANCH_NAME}' was created from a different base — deleting and recreating." >&2
            fi
          fi
        fi
        # Remove orphaned directory that git doesn't track (e.g., from a crashed run)
        if [ -d "${WORKTREE_PATH}" ]; then
          echo "INFO: Removing orphaned worktree directory '${WORKTREE_PATH}'" >&2
          rm -rf "${WORKTREE_PATH}"
        fi
        # Re-prune after potential rm -rf above so the worktree add below
        # does not hit stale registrations pointing at the deleted path.
        git worktree prune >&2
        if [ "$REATTACH_OK" = true ]; then
          git worktree add "${WORKTREE_PATH}" "${BRANCH_NAME}" >&2
        else
          git branch -D "${BRANCH_NAME}" >&2 2>/dev/null || true
          git worktree prune >&2
          git worktree add "${WORKTREE_PATH}" -b "${BRANCH_NAME}" "$BASE_WORKTREE_REF" >&2
        fi
        CREATED=true
      else
        echo "INFO: Creating new branch and worktree." >&2
        # Remove orphaned directory that git doesn't track (e.g., from a crashed run)
        if [ -d "${WORKTREE_PATH}" ]; then
          echo "INFO: Removing orphaned worktree directory '${WORKTREE_PATH}'" >&2
          rm -rf "${WORKTREE_PATH}"
        fi
        # Re-prune after potential rm -rf above so the worktree add below
        # does not hit stale registrations pointing at the deleted path.
        git worktree prune >&2
        git worktree add "${WORKTREE_PATH}" -b "${BRANCH_NAME}" "$BASE_WORKTREE_REF" >&2
        CREATED=true
      fi

      # Keep setup local-only. Remote branch creation/tracking is deferred until
      # step-15, when there is actual work to publish. This avoids redundant
      # network round-trips on reruns and on branches that never produce a commit.

      echo "" >&2
      echo "=== Worktree Setup Complete ===" >&2

      # Output structured JSON for subsequent steps.
      # created=false signals that an existing worktree was reused (diagnostic for re-runs).
      cat << EOF
      {
        "worktree_path": "${WORKTREE_PATH}",
        "branch_name": "${BRANCH_NAME}",
        "created": ${CREATED},
        "bootstrap": ${HAS_REMOTE}
      }
      EOF
    output: "worktree_setup"
    parse_json: true

  - id: "step-04b-validate-worktree"
    type: "bash"
    command: |
      set -euo pipefail
      WORKTREE_DIR="{{worktree_setup.worktree_path}}"
      if [ -z "$WORKTREE_DIR" ]; then
        WORKTREE_DIR="{{resume_worktree_path}}"
      fi
      EXPECTED_BRANCH="{{worktree_setup.branch_name}}"
      if [ -z "$EXPECTED_BRANCH" ]; then
        EXPECTED_BRANCH="{{resume_branch_name}}"
      fi

      if [ -z "$WORKTREE_DIR" ]; then
        echo "ERROR: No worktree path available for validation" >&2
        exit 1
      fi
      if [ ! -d "$WORKTREE_DIR" ]; then
        echo "ERROR: Worktree directory does not exist: $WORKTREE_DIR" >&2
        exit 1
      fi
      if ! git -C "$WORKTREE_DIR" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
        echo "ERROR: Not a valid git worktree: $WORKTREE_DIR" >&2
        exit 1
      fi
      if [ -n "$EXPECTED_BRANCH" ]; then
        ACTUAL_BRANCH=$(git -C "$WORKTREE_DIR" branch --show-current)
        if [ "$ACTUAL_BRANCH" != "$EXPECTED_BRANCH" ]; then
          echo "ERROR: Worktree branch mismatch: expected '$EXPECTED_BRANCH', got '$ACTUAL_BRANCH'" >&2
          exit 1
        fi
      fi
      export WORKTREE_DIR EXPECTED_BRANCH
      python3 - <<'PY'
      import json
      import os

      print(
          json.dumps(
              {
                  "worktree_path": os.environ["WORKTREE_DIR"],
                  "branch_name": os.environ["EXPECTED_BRANCH"],
                  "validated": True,
              }
          )
      )
      PY
    output: "worktree_validation"
    parse_json: true

  # ==========================================================================
  # STEP 5: RESEARCH AND DESIGN
  # ==========================================================================
  - id: "step-05-architecture"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 5: Research and Design - Architecture

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Codebase Analysis:** {{codebase_analysis}}
      **Active Repository Root:** {{worktree_setup.worktree_path}}
      **Worktree Metadata:** {{worktree_setup}}

      Treat `{{worktree_setup.worktree_path}}` as the active repository root for all code reads, edits,
      and commands in this stream.

      Design the solution architecture:

      1. Identify components involved
      2. Define module boundaries
      3. Plan implementation approach
      4. Document module specifications
      5. Identify risks and dependencies
      6. For components with concurrent state or multiple actors modifying shared
         state, express key safety invariants as formal predicates (e.g.,
         "failedAgents ≠ {} ⟹ phase ≠ complete"). Formal constraints in the
         design output produce better code generation than English descriptions.
      7. When designing complex behavioral requirements, consider whether Gherkin
         scenarios or TLA+ specs would clarify the design. This is a judgment
         call — English-only is the default. See PATTERNS.md "Formal
         Specification as Prompt" for evidence and guidance.

      Consider the INVESTIGATION-FIRST PATTERN if the codebase is unfamiliar.

      Output a comprehensive design specification.
    output: "architecture_design"

  - id: "step-05b-api-design"
    agent: "amplihack:api-designer"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 5b: API Design (if applicable)

      **Architecture:** {{architecture_design}}
      **Requirements:** {{final_requirements}}

      Design API contracts:
      - Endpoint definitions
      - Request/response schemas
      - Error handling patterns
      - Versioning strategy

      Skip if no API work is required.
    output: "api_design"

  - id: "step-05c-database-design"
    agent: "amplihack:database"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 5c: Database Design (if applicable)

      **Architecture:** {{architecture_design}}
      **Requirements:** {{final_requirements}}

      Design data model:
      - Schema definitions
      - Migrations needed
      - Indexes and constraints
      - Data relationships

      Skip if no database work is required.
    output: "database_design"

  - id: "step-05d-security-review"
    agent: "amplihack:security"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 5d: Security Requirements Review

      **Architecture:** {{architecture_design}}
      **Requirements:** {{final_requirements}}
      **API Design:** {{api_design}}
      **Database Design:** {{database_design}}

      Identify security requirements:
      - Authentication/authorization needs
      - Input validation requirements
      - Data protection considerations
      - Security risks and mitigations

      Provide security guidelines for implementation.
    output: "security_requirements"

  - id: "step-05e-design-consolidation"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 5e: Design Consolidation

      **Architecture:** {{architecture_design}}
      **API Design:** {{api_design}}
      **Database Design:** {{database_design}}
      **Security Requirements:** {{security_requirements}}

      Consolidate all design inputs into a final implementation plan:

      ```json
      {
        "components": [{"name": "...", "action": "create/modify", "purpose": "..."}],
        "files_to_change": ["list of file paths"],
        "new_files": ["files to create"],
        "test_files": ["test files to create/modify"],
        "implementation_order": ["ordered steps"],
        "risks": ["potential issues"],
        "security_considerations": ["security notes"]
      }
      ```
    output: "design_spec"
    parse_json: true

  # ==========================================================================
  # STEP 6: RETCON DOCUMENTATION WRITING
  # ==========================================================================
  - id: "step-06-documentation"
    agent: "amplihack:documentation-writer"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 6: Retcon Documentation Writing

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Design Specification:** {{design_spec}}

      Write documentation for the feature AS IF IT ALREADY EXISTS.
      This is "retcon" documentation - describing the finished state.

      Write ONLY the documentation, NOT the code:
      - Usage documentation
      - API documentation (if applicable)
      - Configuration documentation
      - Examples and tutorials

      This documentation serves as the specification for implementation.
    output: "documentation"

  - id: "step-06b-documentation-review"
    agent: "amplihack:architect"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 6b: Documentation Review

      **Design Specification:** {{design_spec}}
      **Documentation:** {{documentation}}

      Review the documentation to verify:
      1. Aligns with the architectural vision
      2. Accurately describes intended behavior
      3. Highlights any changes needed to the design

      Provide feedback for documentation refinement.
    output: "doc_review_feedback"

  - id: "step-06c-documentation-refinement"
    agent: "amplihack:documentation-writer"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "not resume_checkpoint"
    prompt: |
      # Step 6c: Documentation Refinement

      **Original Documentation:** {{documentation}}
      **Architect Feedback:** {{doc_review_feedback}}

      Revise the documentation based on the architect's review.
      Ensure it accurately represents the feature we will build.
    output: "final_documentation"

  # ==========================================================================
  # STEP 7: TDD - WRITE TESTS FIRST
  # ==========================================================================
  - id: "step-07-write-tests"
    agent: "amplihack:tester"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 7: TDD - Write Tests First

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Design Specification:** {{design_spec}}
      **Documentation:** {{final_documentation}}

      Following Test-Driven Development methodology:

      Write FAILING tests that specify the expected behavior:
      - Unit tests for each component
      - Integration tests for workflows
      - Edge case tests
      - Error handling tests

      When the design includes Gherkin scenarios or TLA+ formal predicates,
      use them as the primary source for test case derivation — they define
      the behavioral contract more precisely than English requirements.

      These tests should:
      - Define the contract for the implementation
      - Fail initially (code doesn't exist yet)
      - Pass once implementation is complete

      Output test files with clear file path headers.
    output: "test_spec"

  # ==========================================================================
  # STEP 8: IMPLEMENT THE SOLUTION
  # ==========================================================================
  - id: "step-08-implement"
    agent: "amplihack:builder"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 8: Implement the Solution

      **Task:** {{task_description}}
      **Requirements:** {{final_requirements}}
      **Design Specification:** {{design_spec}}
      **Documentation:** {{final_documentation}}
      **Tests (must pass):** {{test_spec}}

      Implement the solution following the design:

      **Rules:**
      1. Follow the design closely
      2. Make failing tests pass iteratively
      3. NO stubs, TODOs, or placeholder code
      4. NO swallowed exceptions
      5. NO faked APIs or data
      6. Clear error messages
      7. Appropriate logging

      **Stub/Placeholder Replacement Rule (CRITICAL):**
      When the task description contains words like "replace", "rewrite",
      "implement", "real implementation", "remove stub", or "remove placeholder",
      existing stubs, placeholders, TODO-marked code, NotImplementedError raises,
      pass-only functions, and type-alias-only modules are **targets for
      replacement, NOT patterns to preserve**. You MUST modify these files.
      Treating existing stub code as correct architecture and producing zero
      changes is a **hollow success** — the worst possible outcome.

      **Output:**
      - Complete implementation code (all files modified or created)
      - File headers: `# File: path/to/file.py`
      - Brief explanation of key decisions
      - Any deviations from design (with justification)
      - List of files changed (MUST be non-empty when task requests changes)
    output: "implementation"

  - id: "step-08b-integration"
    agent: "amplihack:integration"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 8b: External Service Integration

      **Implementation:** {{implementation}}
      **Design Specification:** {{design_spec}}

      Handle external service connections:
      - API client implementations
      - Service adapters
      - Error handling for external calls
      - Retry logic and resilience

      Skip if no external integrations are required.
    output: "integration_code"

  # --------------------------------------------------------------------------
  # HOLLOW SUCCESS DETECTION: Catch 0-change implementations early
  # --------------------------------------------------------------------------
  - id: "step-08c-hollow-success-guard"
    type: "bash"
    command: |
      set -euo pipefail
      WORKTREE_DIR="{{worktree_setup.worktree_path}}"
      if [ -z "$WORKTREE_DIR" ]; then
        echo "ERROR: No worktree path available for hollow success guard" >&2
        exit 1
      fi
      if [ ! -d "$WORKTREE_DIR" ]; then
        echo "ERROR: Worktree path '$WORKTREE_DIR' does not exist for hollow success guard" >&2
        exit 1
      fi
      cd "$WORKTREE_DIR"
      echo "=== Step 8c: Hollow Success Guard ==="

      # Count files changed (staged + unstaged + untracked)
      CHANGED=$(git diff --name-only 2>/dev/null | wc -l)
      STAGED=$(git diff --cached --name-only 2>/dev/null | wc -l)
      UNTRACKED=$(git ls-files --others --exclude-standard 2>/dev/null | wc -l)
      TOTAL=$((CHANGED + STAGED + UNTRACKED))

      echo "Files changed: $CHANGED staged: $STAGED untracked: $UNTRACKED total: $TOTAL"

      if [ "$TOTAL" -eq 0 ]; then
        # Check if the task description contains action verbs that imply changes
        TASK_DESC=$(cat <<EOFTASKDESC
      {{task_description}}
      EOFTASKDESC
        )
        # Detect replace/rewrite/implement/fix/add/create/remove keywords
        if echo "$TASK_DESC" | grep -qiE '(replace|rewrite|implement|fix|add|create|remove|update|refactor|stub|placeholder|real implementation)'; then
          echo "ERROR: Hollow success detected." >&2
          echo "Task description contains action keywords but step-08 produced 0 file changes." >&2
          echo "Task: $(echo "$TASK_DESC" | head -3)" >&2
          echo "" >&2
          echo "This means the implementation agent treated existing code as correct" >&2
          echo "when it should have been replaced. Failing the step so the workflow" >&2
          echo "does not silently succeed with no work done." >&2
          exit 1
        else
          echo "INFO: No file changes, but task does not appear to require code modifications."
        fi
      else
        echo "OK: $TOTAL file(s) affected — implementation produced changes."
      fi

      echo "=== Hollow Success Guard Complete ==="
    output: "hollow_success_check"

  # --------------------------------------------------------------------------
  # CHECKPOINT: Stage implementation work to prevent loss if later steps fail
  # --------------------------------------------------------------------------
  - id: "checkpoint-after-implementation"
    type: "bash"
    condition: "resume_checkpoint != 'checkpoint-after-implementation' and resume_checkpoint != 'checkpoint-after-review-feedback'"
    command: |
      set -euo pipefail
      WORKTREE_DIR="{{worktree_setup.worktree_path}}"
      EXPECTED_BRANCH="{{worktree_setup.branch_name}}"

      if [ ! -d "$WORKTREE_DIR" ]; then
        echo "ERROR: worktree directory '$WORKTREE_DIR' does not exist" >&2
        exit 1
      fi
      WORKTREE_DIR="$(cd "$WORKTREE_DIR" && pwd -P)"
      cd "$WORKTREE_DIR"

      if [ "$(git rev-parse --is-inside-work-tree)" != "true" ]; then
        echo "ERROR: '$WORKTREE_DIR' is not inside a git worktree" >&2
        exit 1
      fi

      ACTUAL_TOPLEVEL="$(git rev-parse --show-toplevel)"
      if [ "$ACTUAL_TOPLEVEL" != "$WORKTREE_DIR" ]; then
        echo "ERROR: expected git top-level '$WORKTREE_DIR' but found '$ACTUAL_TOPLEVEL'" >&2
        exit 1
      fi

      ACTUAL_BRANCH="$(git branch --show-current)"
      if [ "$ACTUAL_BRANCH" != "$EXPECTED_BRANCH" ]; then
        echo "ERROR: expected branch '$EXPECTED_BRANCH' but found '$ACTUAL_BRANCH'" >&2
        exit 1
      fi

      echo "=== Checkpoint: Staging Implementation ==="
      git add -A
      STAGED="$(git diff --cached --name-only)"
      if [ -n "$STAGED" ]; then
        git commit -m "wip: checkpoint after implementation (steps 7-8)

      Automatic checkpoint to preserve work in progress.
      Tests and implementation saved before refactoring phase."
        echo "Checkpoint commit created with $(wc -l <<< "$STAGED") file(s)"
      else
        echo "No changes to checkpoint"
      fi
      STATE_FILE="{{workstream_state_file}}"
      if [ -n "$STATE_FILE" ]; then
        export STATE_FILE WORKTREE_DIR
        export RESUME_TEST_SPEC="$(cat <<'EOF_TEST_SPEC'
      {{test_spec}}
      EOF_TEST_SPEC
        )"
        export RESUME_IMPLEMENTATION="$(cat <<'EOF_IMPLEMENTATION'
      {{implementation}}
      EOF_IMPLEMENTATION
        )"
        export RESUME_INTEGRATION="$(cat <<'EOF_INTEGRATION'
      {{integration_code}}
      EOF_INTEGRATION
        )"
        export RESUME_DESIGN_SPEC="$(cat <<'EOF_DESIGN_SPEC'
      {{design_spec}}
      EOF_DESIGN_SPEC
        )"
        export RESUME_FINAL_REQUIREMENTS="$(cat <<'EOF_FINAL_REQUIREMENTS'
      {{final_requirements}}
      EOF_FINAL_REQUIREMENTS
        )"
        export RESUME_SECURITY_REQUIREMENTS="$(cat <<'EOF_SECURITY_REQUIREMENTS'
      {{security_requirements}}
      EOF_SECURITY_REQUIREMENTS
        )"
        export RESUME_FINAL_DOCUMENTATION="$(cat <<'EOF_FINAL_DOCUMENTATION'
      {{final_documentation}}
      EOF_FINAL_DOCUMENTATION
        )"
        export RESUME_WORKTREE_JSON="$(cat <<'EOF_WORKTREE_SETUP'
      {{worktree_setup}}
      EOF_WORKTREE_SETUP
        )"
        python3 - <<'PY'
      import json
      import os
      from pathlib import Path

      state_path = Path(os.environ["STATE_FILE"])
      state_path.parent.mkdir(parents=True, exist_ok=True)
      state = {}
      if state_path.exists():
          try:
              state = json.loads(state_path.read_text(encoding="utf-8"))
          except json.JSONDecodeError:
              state = {}
      resume_context = state.get("resume_context")
      if not isinstance(resume_context, dict):
          resume_context = {}
      resume_context.update(
          {
              "test_spec": os.environ.get("RESUME_TEST_SPEC", ""),
              "implementation": os.environ.get("RESUME_IMPLEMENTATION", ""),
              "integration_code": os.environ.get("RESUME_INTEGRATION", ""),
              "design_spec": os.environ.get("RESUME_DESIGN_SPEC", ""),
              "final_requirements": os.environ.get("RESUME_FINAL_REQUIREMENTS", ""),
              "security_requirements": os.environ.get("RESUME_SECURITY_REQUIREMENTS", ""),
              "final_documentation": os.environ.get("RESUME_FINAL_DOCUMENTATION", ""),
              "worktree_setup": json.loads(os.environ.get("RESUME_WORKTREE_JSON", "{}") or "{}"),
          }
      )
      state.update(
          {
              "checkpoint_id": "checkpoint-after-implementation",
              "current_step": "checkpoint-after-implementation",
              "worktree_path": os.environ["WORKTREE_DIR"],
              "progress_sidecar": "{{workstream_progress_file}}",
              "resume_context": resume_context,
          }
      )
      tmp = state_path.with_name(f".{state_path.name}.tmp")
      tmp.write_text(json.dumps(state, sort_keys=True), encoding="utf-8")
      tmp.replace(state_path)
      PY
      fi
      echo "=== Checkpoint Complete ==="
    output: "impl_checkpoint"

  # ==========================================================================
  # STEP 9: REFACTOR AND SIMPLIFY
  # ==========================================================================
  - id: "step-09-refactor"
    agent: "amplihack:cleanup"
    working_dir: "{{worktree_setup.worktree_path}}"
    condition: "resume_checkpoint != 'checkpoint-after-review-feedback'"
    prompt: |
      # Step 9: Refactor and Simplify

      **CRITICAL:** User requirements that CANNOT be removed:
      {{final_requirements}}

      **Implementation to refactor:** {{implementation}}
      **Integration code:** {{integration_code}}

      Apply ruthless simplification WITHIN user constraints:

      1. Remove unnecessary abstractions (not explicitly requested)
      2. Eliminate dead code (unless user wanted it)
      3. Simplify complex logic (without violating specs)
      4. Ensure single responsibility principle
      5. Verify no placeholders remain

      **Zero-BS Checklist:**
      - [ ] No stubs
      - [ ] No TODOs
      - [ ] No swallowed exceptions
      - [ ] No unimplemented functions

      **VALIDATE:** All explicit user requirements still preserved.
    output: "refactored_code"

  - id: "step-09b-optimize"
    agent: "amplihack:optimizer"
