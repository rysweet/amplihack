# Outside-in test: LearningAgent mixin refactor (PR #3894 / Issue #3847)
# Verifies that the LearningAgent class was split into 7 focused mixin modules,
# that the public API is unchanged, and the critical bug fix is in place.

name: "LearningAgent Mixin Refactor - Smoke Test"
description: >
  Issue #3847 refactored the 4,595-line LearningAgent into 7 mixin modules.
  Validates: all mixin modules exist, LearningAgent inherits from all mixins,
  public API unchanged, prompt_utils provides shared completion accessor,
  learning_agent.py is a thin orchestrator, and critical bug fix is in place.
version: "1.0.0"
config:
  timeout: 120000
  retries: 0
  parallel: false

environment:
  requires: []

agents:
  - name: "cli-agent"
    type: "cli"
    config:
      workingDirectory: "."
      defaultTimeout: 30000
      executionMode: "spawn"
      captureOutput: true
      ioConfig:
        encoding: "utf8"
        handleInteractivePrompts: false
      logConfig:
        logCommands: true
        logOutput: true
        logLevel: "info"

steps:
  # --- Phase 1: All mixin module files exist ---
  - name: "All 8 mixin modules exist"
    agent: "cli-agent"
    action: "execute_command"
    params:
      command: "python3 -c \"from pathlib import Path; base = Path('src/amplihack/agents/goal_seeking'); modules = ['intent_detector.py', 'temporal_reasoning.py', 'code_synthesis.py', 'knowledge_utils.py', 'retrieval_strategies.py', 'learning_ingestion.py', 'answer_synthesizer.py', 'prompt_utils.py']; missing = [m for m in modules if not (base / m).exists()]; assert not missing, f'Missing: {missing}'; print(f'PASS: all {len(modules)} mixin modules exist')\""
    timeout: 10000

  - name: "Verify mixin modules exist marker"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "PASS: all 8 mixin modules exist"
    timeout: 5000

  # --- Phase 2: LearningAgent inherits from all mixins ---
  - name: "LearningAgent MRO includes all mixins"
    agent: "cli-agent"
    action: "execute_command"
    params:
      command: "PYTHONPATH=src python3 -c \"from amplihack.agents.goal_seeking.learning_agent import LearningAgent; mro_names = [c.__name__ for c in LearningAgent.__mro__]; expected = ['IntentDetectorMixin', 'TemporalReasoningMixin', 'CodeSynthesisMixin', 'KnowledgeUtilsMixin', 'RetrievalStrategiesMixin', 'LearningIngestionMixin', 'AnswerSynthesizerMixin']; missing = [m for m in expected if m not in mro_names]; assert not missing, f'Missing from MRO: {missing}'; print(f'PASS: LearningAgent inherits all {len(expected)} mixins')\""
    timeout: 15000

  - name: "Verify MRO marker"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "PASS: LearningAgent inherits all 7 mixins"
    timeout: 5000

  # --- Phase 3: Public API preserved ---
  - name: "Public API methods exist on LearningAgent"
    agent: "cli-agent"
    action: "execute_command"
    params:
      command: "PYTHONPATH=src python3 -c \"from amplihack.agents.goal_seeking.learning_agent import LearningAgent; public_api = ['learn_from_content', 'answer_question', 'answer_question_agentic', 'get_memory_stats', 'flush_memory', 'close']; missing = [m for m in public_api if not hasattr(LearningAgent, m)]; assert not missing, f'Missing public API: {missing}'; print(f'PASS: all {len(public_api)} public API methods present')\""
    timeout: 15000

  - name: "Verify public API marker"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "PASS: all 6 public API methods present"
    timeout: 5000

  # --- Phase 4: prompt_utils._get_llm_completion works ---
  - name: "prompt_utils._get_llm_completion resolves dynamically"
    agent: "cli-agent"
    action: "execute_command"
    params:
      command: "PYTHONPATH=src python3 -c \"import amplihack.agents.goal_seeking.learning_agent as la_mod; from amplihack.agents.goal_seeking.prompt_utils import _get_llm_completion; fn = _get_llm_completion(); assert fn is la_mod._llm_completion, 'Dynamic resolution failed'; print('PASS: _get_llm_completion resolves to learning_agent._llm_completion')\""
    timeout: 15000

  - name: "Verify prompt_utils marker"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "PASS: _get_llm_completion resolves"
    timeout: 5000

  # --- Phase 5: learning_agent.py is now thin orchestrator ---
  - name: "learning_agent.py is under 400 lines"
    agent: "cli-agent"
    action: "execute_command"
    params:
      command: "python3 -c \"lines = len(open('src/amplihack/agents/goal_seeking/learning_agent.py').readlines()); assert lines < 400, f'learning_agent.py is {lines} lines (expected < 400)'; print(f'PASS: learning_agent.py is {lines} lines (thin orchestrator)')\""
    timeout: 10000

  - name: "Verify thin orchestrator marker"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "PASS: learning_agent.py is"
    timeout: 5000

  # --- Phase 6: Critical bug fix verified ---
  - name: "evaluate_answer_completeness returns incomplete on exception"
    agent: "cli-agent"
    action: "execute_command"
    params:
      command: "python3 -c \"source = open('src/amplihack/agents/goal_seeking/answer_synthesizer.py').read(); assert '\\\"is_complete\\\": False' in source, 'Bug not fixed: exception handler still returns True'; print('PASS: _evaluate_answer_completeness returns is_complete=False on exception')\""
    timeout: 10000

  - name: "Verify bug fix marker"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "PASS: _evaluate_answer_completeness returns"
    timeout: 5000
