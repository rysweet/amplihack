name: "Issue classifier workflow budget and permissions"
description: "Verify the issue-classifier workflow keeps the 10-minute budget, writes recipe logs, and compiles without permission warnings."
version: "1.0.0"

config:
  timeout: 90000
  retries: 0
  parallel: false

environment:
  requires: []

agents:
  - name: "cli-agent"
    type: "cli"
    config:
      workingDirectory: "."
      defaultTimeout: 30000
      executionMode: "spawn"
      captureOutput: true
      ioConfig:
        encoding: "utf8"
        handleInteractivePrompts: false
      logConfig:
        logCommands: true
        logOutput: true
        logLevel: "info"

steps:
  - name: "Run issue-classifier QA command"
    agent: "cli-agent"
    action: "execute_command"
    params:
      command: >-
        bash -lc '/home/azureuser/src/amplihack-pm/.venv/bin/python -m pytest tests/unit/workflows/test_issue_classifier_workflow.py tests/recipes/test_rust_runner_execution.py::TestProgressStreaming::test_progress_mode_announces_and_writes_recipe_log -q && gh aw compile issue-classifier --no-emit 2>&1 && echo ISSUE_CLASSIFIER_COMPILE_OK && echo ISSUE_CLASSIFIER_QA_OK'
    timeout: 90000

  - name: "Verify issue classifier QA marker"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "ISSUE_CLASSIFIER_QA_OK"
    timeout: 10000

  - name: "Verify clean compile output"
    agent: "cli-agent"
    action: "wait_for_output"
    params:
      target: "ISSUE_CLASSIFIER_COMPILE_OK"
    timeout: 10000

cleanup:
  - name: "Capture CLI output"
    agent: "cli-agent"
    action: "capture_output"

metadata:
  tags:
    [
      "cli",
      "workflow",
      "issue-classifier",
      "recipe-log",
      "regression",
      "issue-3963",
      "issue-3978",
      "issue-4120",
    ]
  priority: "high"
