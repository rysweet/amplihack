# Outside-in test: supply-chain-audit skill (#3440 / PR #3481)
# Verifies the skill is structurally correct and functional from a user perspective.

name: "Supply-Chain-Audit Skill Structural Verification"
description: |
  Verifies that the supply-chain-audit skill is correctly structured,
  all required files exist, SKILL.md has proper frontmatter, the Python
  package imports cleanly, all 12 audit dimensions are present, and the
  test suite passes.
version: "1.0.0"
config:
  timeout: 120000
  retries: 1
  parallel: false

agents:
  - name: "verifier"
    type: "system"
    config:
      shell: "bash"
      cwd: "/home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th"
      timeout: 60000
      capture_output: true

steps:
  # --- Skill Definition ---
  - name: "SKILL.md exists"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "test -f .claude/skills/supply-chain-audit/SKILL.md && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "SKILL.md has correct name in frontmatter"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep '^name: supply-chain-audit' .claude/skills/supply-chain-audit/SKILL.md && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "SKILL.md declares auto-activation triggers"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep 'auto_activates:' .claude/skills/supply-chain-audit/SKILL.md && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "SKILL.md has version field"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep 'version:' .claude/skills/supply-chain-audit/SKILL.md && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  # --- Bundle Distribution ---
  - name: "Bundle distribution SKILL.md exists"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "test -f amplifier-bundle/skills/supply-chain-audit/SKILL.md && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  # --- Documentation ---
  - name: "How-to guide exists"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "test -f docs/howto/run-supply-chain-audit.md && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  # --- Python Package ---
  - name: "Python package is importable"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'python3 -c "import importlib.util; spec = importlib.util.spec_from_file_location(''supply_chain_audit'', ''.claude/skills/supply-chain-audit/supply_chain_audit/__init__.py''); assert spec is not None; print(''PASS'')"'
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "Core audit module imports"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'python3 -c "import sys; sys.path.insert(0, ''.claude/skills/supply-chain-audit''); from supply_chain_audit.audit import AuditResult; print(''PASS'')"'
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "Schema module imports"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'python3 -c "import sys; sys.path.insert(0, ''.claude/skills/supply-chain-audit''); from supply_chain_audit.schema import Finding; print(''PASS'')"'
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "Detector module imports"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'python3 -c "import sys; sys.path.insert(0, ''.claude/skills/supply-chain-audit''); from supply_chain_audit.detector import EcosystemScope; print(''PASS'')"'
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "Report module imports"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'python3 -c "import sys; sys.path.insert(0, ''.claude/skills/supply-chain-audit''); from supply_chain_audit.report import AuditReport; print(''PASS'')"'
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  # --- All 8 Ecosystem Checkers ---
  - name: "All 8 ecosystem checkers import"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'python3 -c "import sys; sys.path.insert(0, ''.claude/skills/supply-chain-audit''); from supply_chain_audit.checkers import python, node, go, rust, dotnet, actions, containers, credentials; print(''PASS: 8 checkers'')"'
    expect:
      stdout_contains: ["PASS: 8 checkers"]
      exit_code: 0

  # --- 12 Audit Dimensions in SKILL.md ---
  - name: "Dimension: Dependency Pinning"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep -ci 'dependency pinning' .claude/skills/supply-chain-audit/SKILL.md"
    expect:
      exit_code: 0

  - name: "Dimension: Known Vulnerabilities"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep -ciE 'CVE|advisory|vuln' .claude/skills/supply-chain-audit/SKILL.md"
    expect:
      exit_code: 0

  - name: "Dimension: SLSA Compliance"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep -ci 'SLSA' .claude/skills/supply-chain-audit/SKILL.md"
    expect:
      exit_code: 0

  - name: "Dimension: SHA Pinning"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep -ci 'pinning' .claude/skills/supply-chain-audit/SKILL.md"
    expect:
      exit_code: 0

  - name: "Dimension: Container Image"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep -ci 'container' .claude/skills/supply-chain-audit/SKILL.md"
    expect:
      exit_code: 0

  - name: "Dimension: Credential Scanning"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "grep -ci 'credential' .claude/skills/supply-chain-audit/SKILL.md"
    expect:
      exit_code: 0

  # --- Test Suite ---
  - name: "Full test suite passes"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "python3 -m pytest .claude/skills/supply-chain-audit/tests/ -q --tb=line 2>&1"
    timeout: 60000
    expect:
      stdout_contains: ["passed"]
      exit_code: 0

  # --- Test Fixtures ---
  - name: "Test fixture scenario_a exists"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "test -d .claude/skills/supply-chain-audit/tests/fixtures/scenario_a && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  - name: "Test fixture scenario_b exists"
    agent: "verifier"
    action: "execute_command"
    params:
      command: "test -d .claude/skills/supply-chain-audit/tests/fixtures/scenario_b && echo PASS"
    expect:
      stdout_contains: ["PASS"]
      exit_code: 0

  # --- Reference Docs ---
  - name: "At least 10 reference docs"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'COUNT=$(ls .claude/skills/supply-chain-audit/reference/*.md | wc -l); [ $COUNT -ge 10 ] && echo "PASS: $COUNT docs" || echo "FAIL: only $COUNT docs"'
    expect:
      stdout_contains: ["PASS"]

  # --- Live Audit Run (the real test) ---
  - name: "Audit runs on amplihack repo without crashing"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit.audit import run_audit; r = run_audit(chr(47)+''home''+chr(47)+''azureuser''+chr(47)+''src''+chr(47)+''amplihack''); print(''FINDINGS: ''+str(len(r.findings))); assert len(r.findings) > 0; assert ''Supply Chain Audit Report'' in r.render_report(); print(''LIVE_AUDIT_PASS'')"'
    expect:
      stdout_contains: ["LIVE_AUDIT_PASS", "FINDINGS:"]

  - name: "Audit produces findings across multiple dimensions"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit.audit import run_audit; r = run_audit(chr(47)+''home''+chr(47)+''azureuser''+chr(47)+''src''+chr(47)+''amplihack''); dims = set(f.dimension for f in r.findings); print(''ACTIVE_DIMS: ''+str(sorted(dims))); assert len(dims) >= 3; print(''MULTI_DIM_PASS'')"'
    expect:
      stdout_contains: ["MULTI_DIM_PASS", "ACTIVE_DIMS:"]

  - name: "XPIA detection produces advisories not crashes"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit.audit import run_audit; r = run_audit(chr(47)+''home''+chr(47)+''azureuser''+chr(47)+''src''+chr(47)+''amplihack''); xpia = [a for a in r.get_advisory_messages() if ''XPIA'' in a]; print(''XPIA_ADVISORIES: ''+str(len(xpia))); assert len(xpia) >= 1; print(''XPIA_ADVISORY_PASS'')"'
    expect:
      stdout_contains: ["XPIA_ADVISORY_PASS"]

  - name: "Scoped audit (gha-only) completes"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit.audit import run_audit; r = run_audit(chr(47)+''home''+chr(47)+''azureuser''+chr(47)+''src''+chr(47)+''amplihack'', scope=''gha''); dims = set(f.dimension for f in r.findings); print(''GHA_DIMS: ''+str(sorted(dims))); assert all(d in (1,2,3,4,6) for d in dims); print(''SCOPED_AUDIT_PASS'')"'
    expect:
      stdout_contains: ["SCOPED_AUDIT_PASS"]

  # --- Auto-install feature ---
  - name: "check_missing_tools returns list"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit import check_missing_tools; m = check_missing_tools(); assert isinstance(m, list); print(''MISSING_COUNT: ''+str(len(m))); [print(t[''name'']+'': ''+t[''description'']) for t in m]; print(''CHECK_MISSING_PASS'')"'
    expect:
      stdout_contains: ["CHECK_MISSING_PASS"]

  - name: "install_tool returns tuple for unknown tool"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit import install_tool; ok, msg = install_tool(''nonexistent-xyz''); assert ok is False; assert ''No install'' in msg; print(''UNKNOWN_TOOL_PASS'')"'
    expect:
      stdout_contains: ["UNKNOWN_TOOL_PASS"]

  - name: "install_tool detects already-installed gh"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit import install_tool; ok, msg = install_tool(''gh''); assert ok is True; assert ''already installed'' in msg; print(''GH_ALREADY_PASS'')"'
    expect:
      stdout_contains: ["GH_ALREADY_PASS"]

  - name: "check_missing_tools entries have required keys"
    agent: "verifier"
    action: "execute_command"
    params:
      command: 'cd /home/azureuser/src/amplihack/worktrees/feat/issue--review-github-issue-3440-gh-issue-view-3440-and-th && PYTHONPATH=.claude/skills/supply-chain-audit python3 -c "from supply_chain_audit import check_missing_tools; m = check_missing_tools(); [print(t[''name''], len(t[''install_options''])) for t in m]; assert all(''name'' in t and ''description'' in t and ''install_options'' in t for t in m); print(''KEYS_PASS'')"'
    expect:
      stdout_contains: ["KEYS_PASS"]

# Run: gadugi-test run -f tests/gadugi/supply-chain-audit-skill.yaml
