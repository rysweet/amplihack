# CLI Command Test - callees
# Auto-generated outside-in test scenario

scenario:
  name: "CLI Command - cli.py callees"
  description: |
    Verifies that the 'callees' command works correctly with valid arguments,
    produces expected output, and handles basic error cases.
  type: cli
  level: 1
  tags: [cli, command, callees, auto-generated]

  prerequisites:
    - "src/amplihack/cli.py binary exists and is executable"

  steps:
    - action: launch
      target: "src/amplihack/cli.py"
