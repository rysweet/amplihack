# CLI Command Test - import
# Auto-generated outside-in test scenario

scenario:
  name: "CLI Command - cli.py import"
  description: |
    Verifies that the 'import' command works correctly with valid arguments,
    produces expected output, and handles basic error cases.
  type: cli
  level: 1
  tags: [cli, command, import, auto-generated]

  prerequisites:
    - "src/amplihack/cli.py binary exists and is executable"

  steps:
    - action: launch
      target: "src/amplihack/cli.py"
      args: ["import"]
      description: "Run import with valid arguments"
      timeout: 15s

    - action: verify_output
      matches: "(.+)"
      timeout: 10s
      description: "Command should produce expected output"

    - action: verify_exit_code
      expected: 0
      description: "Command should succeed with valid args"

    - action: launch
      target: "src/amplihack/cli.py"
      args: ["import", "--env"]
      description: "Run import with --env flag"
      timeout: 15s

    - action: verify_exit_code
      expected: 0
      description: "Command with flag should succeed"

  cleanup:
    - action: stop_application
      force: true
      description: "Ensure process is terminated"
