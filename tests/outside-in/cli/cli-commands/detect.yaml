# CLI Command Test - detect
# Auto-generated outside-in test scenario

scenario:
  name: "CLI Command - cli.py detect"
  description: |
    Verifies that the 'detect' command works correctly with valid arguments,
    produces expected output, and handles basic error cases.
  type: cli
  level: 1
  tags: [cli, command, detect, auto-generated]

  prerequisites:
    - "src/amplihack/cli.py binary exists and is executable"

  steps:
    - action: launch
      target: "src/amplihack/cli.py"
      args: ["detect"]
      description: "Run detect with valid arguments"
      timeout: 15s

    - action: verify_output
      matches: "(.+)"
      timeout: 10s
      description: "Command should produce expected output"

    - action: verify_exit_code
      expected: 0
      description: "Command should succeed with valid args"

    - action: launch
      target: "src/amplihack/cli.py"
      args: ["detect", "--find-path"]
      description: "Run detect with --find-path flag"
      timeout: 15s

    - action: verify_exit_code
      expected: 0
      description: "Command with flag should succeed"

  cleanup:
    - action: stop_application
      force: true
      description: "Ensure process is terminated"
