# CLI Smoke Tests - cli.py
# Auto-generated outside-in test scenarios

scenario:
  name: "CLI Smoke - cli.py Basic Operations"
  description: |
    Verifies that cli.py CLI starts correctly, responds to --help and --version,
    and exits cleanly.
  type: cli
  level: 1
  tags: [cli, smoke, basic, auto-generated]

  prerequisites:
    - "src/amplihack/cli.py binary exists and is executable"

  steps:
    - action: launch
      target: "src/amplihack/cli.py"
      args: ["--help"]
      description: "Run help command"
      timeout: 10s

    - action: verify_output
      matches: "(usage|help|commands|options)"
      timeout: 5s
      description: "Help output should contain usage info"

    - action: verify_exit_code
      expected: 0
      description: "Help command should exit cleanly"

    - action: launch
      target: "src/amplihack/cli.py"
      args: ["--version"]
      description: "Run version command"
      timeout: 5s

    - action: verify_output
      matches: "(\\d+\\.\\d+|version)"
      timeout: 3s
      description: "Should display version information"

    - action: verify_exit_code
      expected: 0
      description: "Version command should exit cleanly"

  cleanup:
    - action: stop_application
      force: true
      description: "Ensure process is terminated"
